// ══════════════════════ 重绑定适配项For_echo ═════════════════════════
sensitivity 1.10                                    // 灵敏度
unbind "x"
unbind "c"
unbind "6"
unbind "v"
unbind "y"
bind "z" "radio2;slot12"                            // 打开无线电菜单、X光显示、医疗针
bind "t" "+spray_menu"                              // 打开喷漆菜单
unbind "i"
bind "u" "messagemode2"                             // 打开团队聊天
bind "y" "messagemode"                              // 打开全局聊天
bind "mwheeldown" "invnext"                         // 鼠标滚轮切换装备
bind "mwheelup" "invprev"                           // 鼠标滚轮切换装备
bind "v" "switchhands"                              // 切换武器持握方式（左手/右手）
cl_teamcounter_playercount_instead_of_avatars 0     // 显示上层对局存活数字(1)或者头像(0)
safezonex "1"                                       // 设置 HUD 水平占比
safezoney "1"                                       // 设置 HUD 竖直占比
cl_hud_color "5"                                    // 设置 HUD 颜色
cl_showloadout "1"                                  // 不总显示物品栏
cl_color "4"                       // 设置队伍中玩家雷达与头像框颜色
// ─────────────────────── 导航栏补充 ────────────────────────────────
echo ──────────────────────── echo更新表 ──────────────────────────────
echo 无
