// ══════════════════════ 重绑定适配项For_yszh ═════════════════════════
sensitivity 0.90                                    // 灵敏度
unbind "ctrl"
bind "mouse4" "+duck"                               // 蹲下
bind "x" "slot10"                                   // 火
bind "v" "+voicerecord"                             // 语音
unbind "mouse5"
bind "mouse3" "player_ping"		                    // 玩家标记
bind "mwheeldown" "invnext"                         // 鼠标滚轮切换装备
bind "mwheelup" "invprev"                           // 鼠标滚轮切换装备
bind "h" "switchhands"                              // 切换武器持握方式（左手/右手）
bind "t" "toggleradarscale"                         // 切换雷达缩放比例
bind "alt" "toggle cl_teamid_overhead_mode 1 3"     // 切换队友头顶标识模式
bind "n" "noclip"                                   // 飞行键
cl_teamcounter_playercount_instead_of_avatars 0     // 显示上层对局存活数字(1)或者头像(0)
cl_color "2"                       // 设置队伍中玩家雷达与头像框颜色
// ────────────────────────── 准星设置 ──────────────────────────────
c06;cyan;
// ─────────────────────── 导航栏补充 ────────────────────────────────
echo ──────────────────────── yszh更新表 ──────────────────────────────
echo ──── 切换雷达缩放比例           :  t键       | toggleradarscale
echo ──── 切换队友头顶标识模式       :  alt键     | toggle cl_teamid_overhead_mode 1 3
echo ──── 默认飞行键                :  n键       | noclip
// ════════════════════════════════════════════════════════════════════