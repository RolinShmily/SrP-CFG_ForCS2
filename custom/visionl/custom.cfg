// ══════════════════════ 重绑定适配项For_visionl ═════════════════════════
sensitivity 1.2                                    // 灵敏度
unbind v
unbind 4
unbind t
unbind y
unbind mouse5
unbind z
unbind x
unbind c
unbind 6
unbind mwheelup
unbind mwheeldown
unbind '
unbind u
bind "mwheeldown" "invnext"                         // 鼠标滚轮切换装备
bind "mwheelup" "invprev"                           // 鼠标滚轮切换装备
bind "v" "+voicerecord"       // 语音
bind "mouse3" "player_ping"		   // 玩家标记
bind "z" "radio2;slot12"                           // 打开无线电菜单、X光显示、医疗针
bind "4" "slot4"                   // 投掷物
bind "t" "+spray_menu"             // 打开喷漆菜单
bind "y" "messagemode"             // 打开全局聊天
bind "u" "messagemode2"            // 打开团队聊天
bind "c" "toggleradarscale"                        // 切换雷达缩放比例
cl_hud_color 5;
snd_headphone_eq 0                    // 均衡器
snd_menumusic_volume 0             // 主菜单音乐音量
snd_roundstart_volume 0               // 回合开始音量
snd_roundend_volume 0            // 回合结束音量
snd_roundaction_volume 0              // 回合开始行动音量
snd_mvp_volume 0.12                   // MVP音量
snd_mapobjective_volume 0         // 炸弹/人质音量
snd_tensecondwarning_volume 0      // 十秒警告音量
snd_deathcamera_volume 0          // 死亡视角音量
snd_mute_mvp_music_live_players 1     // 当双方团队成员都存活时关闭 MVP 音乐
snd_mute_losefocus 0                  // 后台播放声音
voice_modenable 1                     // 启用语音
hud_showtargetid "0"               // 显示队友/敌人的 ID
cl_color "3"                       // 设置队伍中玩家雷达与头像框颜色
// ─────────────────────── 准星持枪 ────────────────────────────────
c06;cyan;
v06;
// ─────────────────────── 导航栏补充 ────────────────────────────────
echo ──────────────────────── visionl更新表 ──────────────────────────────
echo ──── 切换雷达缩放比例           :  c键       | toggleradarscale
