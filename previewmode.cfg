echo previewmode Enabled!
echo ────────────────────────── 常用指令 ──────────────────────────────
echo ·输入 depre  → 取消默认预设值：关闭摄像机锁定，关闭景深，显示HUD等         
echo ────────────────────────── 功能快捷键 ───────────────────────────────
echo ──── 重启该CFG/应用预设值      :  9键         | exec previewmode
echo ──── 是否显示HUD              :  Z键         | toggle cl_drawhud
echo ──── 是否锁定摄像机视角         :  X键         | toggle cl_lock_camera
echo ──── 是否开启景深              :  C键         | toggle r_dof_override
echo ──── 切换景深深度              :  V键         | r_dof_override_near_blurry
echo ──── 向左旋转视角              :  -键         | setang pitch yaw
echo ──── 向右旋转视角              :  =键         | setang pitch yaw
echo ──── FOV视角深度切换(放大镜)    :  ↓键         | fov_cs_debug
