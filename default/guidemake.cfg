echo ══════════════════════════════════════════════════════════════════
echo 文档地址："https://doc.srprolin.top/SrP-CFG_CS2/srpcfg-1"
echo guidemake Enabled!
echo ─────────────────────────   使用说明   ────────────────────────────
echo ·本配置为地图指南制作专用，适合在练习模式下使用：
echo ·在投掷出投掷物后保持视角不动,按下对应快捷键创建投掷物标识。
echo ·创建的标识会以"label"命名，方便后续编辑，首次使用建议先只创建一个标识后进行保存，并重新启动进入游戏。
echo ·按下快捷键"Enter"保存地图指南，文件名为"mapguide",保存位置: "...\SteamLibrary\steamapps\common\Counter-Strike Global Offensive\game\csgo\annotations\local\mapguide"
echo ·接下来打开对应的"TXT"文件，对每一组标识进行文本编辑，建议在地图上创建一个标识后就进行保存，并在此文件中进行序号编辑，方便后续查找和修改。
echo ·制作好之后，请务必将该指南的文件夹名、文件名进行修改，以避免与其他指南冲突，造成覆盖。
echo ───────────────────────── 地图指南指令 ────────────────────────────
echo ──── 允许查看和编辑地图指南: sv_allow_annotations_access_level 2
echo ──── 创建投掷物描点: annotation_create grenade [smoke|flash|he|molotov|incendiary|decoy] "label"
echo ──── 删除上一个标识: annotation_delete_previous_node_set
echo ──── 清除全部标识: annotation_clear | 快捷键 "rshift" (右侧shift)
echo ──── 保存地图指南: annotation_save "filename"
echo ─────────────────────────── 快捷键 ────────────────────────────────
echo ──── 创建手雷标识             :  Z
echo ──── 创建闪光弹标识           :  X
echo ──── 创建高爆弹标识           :  C
echo ──── 创建燃烧弹标识           :  V
echo ──── 创建诱饵弹标识           :  6
echo ──── 删除上一个标识           :  Del
echo ──── 保存地图指南(名称为"mapguide")  :  Enter
echo ──── 上传至创意工坊(控制台输入) : "upload"  
echo ══════════════════════════════════════════════════════════════════