// ═════════════════════════════ main ════════════════════════════════
sv_cheats 1									//开启作弊
sv_allow_annotations_access_level 2         //允许查看和编辑地图指南
annotation_auto_load 1						//允许自动加载地图指南
alias "fire" "annotation_create grenade molotov "label";annotation_create grenade incendiary "label""
alias "upload" "workshop_annotation_submit"
bind "z" "annotation_create grenade he "label""
bind "x" "annotation_create grenade flash "label""
bind "c" "annotation_create grenade smoke "label""
bind "v" "fire"
bind "6" "annotation_create grenade decoy "label""
bind "del" "annotation_delete_previous_node_set"
bind "enter" "annotation_save "mapguide""

