// Preview/camera settings. Physical keys are isolated in keymap.cfg.
sv_cheats 1                              // Required for debug camera controls.
cl_draw_only_deathnotices 0              // Restore full HUD mode before hiding it.
cl_drawhud_force_radar 0                 // Let this mode control the radar normally.
cl_drawhud 0                             // Hide the HUD for capture.
r_dof_override 1                         // Enable depth-of-field override.
r_dof_override_near_blurry 1000          // Initial blur depth.
fov_cs_debug 110                         // Wide first-person debug FOV.
cl_lock_camera 1                         // Lock camera orientation.
echo [SrP-CFG] Preview settings applied; use depre to restore its visual changes.
