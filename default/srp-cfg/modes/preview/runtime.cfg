// Persistent preview-mode command vocabulary. No camera state or physical key is changed here.
alias "depre" "cl_drawhud 1;r_dof_override 0;r_dof_override_near_blurry 0;fov_cs_debug 0;cl_lock_camera 0;echo 已恢复预览模式修改的画面状态!"
alias "changeblur" "blur1"
alias "blur0" "r_dof_override_near_blurry 3000;alias changeblur blur1"
alias "blur1" "r_dof_override_near_blurry 50;alias changeblur blur2"
alias "blur2" "r_dof_override_near_blurry 100;alias changeblur blur3"
alias "blur3" "r_dof_override_near_blurry 500;alias changeblur blur4"
alias "blur4" "r_dof_override_near_blurry 1000;alias changeblur blur0"
alias "changeang++" "ang1"
alias "ang0+" "setang pitch yaw 0;alias changeang++ ang1"
alias "ang1" "setang pitch yaw 10;alias changeang++ ang2"
alias "ang2" "setang pitch yaw 20;alias changeang++ ang3"
alias "ang3" "setang pitch yaw 30;alias changeang++ ang4"
alias "ang4" "setang pitch yaw 40;alias changeang++ ang5"
alias "ang5" "setang pitch yaw 50;alias changeang++ ang0+"
alias "changeang--" "ang-1"
alias "ang0-" "setang pitch yaw 0;alias changeang-- ang-1"
alias "ang-1" "setang pitch yaw -10;alias changeang-- ang-2"
alias "ang-2" "setang pitch yaw -20;alias changeang-- ang-3"
alias "ang-3" "setang pitch yaw -30;alias changeang-- ang-4"
alias "ang-4" "setang pitch yaw -40;alias changeang-- ang-5"
alias "ang-5" "setang pitch yaw -50;alias changeang-- ang0-"
alias "changefov" "fov1"
alias "fov0" "fov_cs_debug 0;alias changefov fov1"
alias "fov1" "fov_cs_debug 10;alias changefov fov2"
alias "fov2" "fov_cs_debug 20;alias changefov fov3"
alias "fov3" "fov_cs_debug 30;alias changefov fov4"
alias "fov4" "fov_cs_debug 40;alias changefov fov5"
alias "fov5" "fov_cs_debug 50;alias changefov fov6"
alias "fov6" "fov_cs_debug 60;alias changefov fov7"
alias "fov7" "fov_cs_debug 70;alias changefov fov8"
alias "fov8" "fov_cs_debug 80;alias changefov fov9"
alias "fov9" "fov_cs_debug 90;alias changefov fov10"
alias "fov10" "fov_cs_debug 100;alias changefov fov11"
alias "fov11" "fov_cs_debug 110;alias changefov fov12"
alias "fov12" "fov_cs_debug 120;alias changefov fov13"
alias "fov13" "fov_cs_debug 130;alias changefov fov14"
alias "fov14" "fov_cs_debug 140;alias changefov fov15"
alias "fov15" "fov_cs_debug 150;alias changefov fov0"
