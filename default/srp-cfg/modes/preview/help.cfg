echo ═════════════════ preview commands ═════════════════
echo srp_preview       : 应用预览画面设置，不修改物理按键
echo srp_preview_keys  : 同时绑定 Z/X/C/V、-、=、下方向键
echo depre             : 恢复本模式修改的 HUD、景深、FOV 与相机锁定
echo changeblur        : 轮换景深距离
echo changefov         : 轮换 debug FOV
echo changeang++       : 向正方向轮换相机滚转角
echo changeang--       : 向负方向轮换相机滚转角
echo ═══════════════════════════════════════════════════
