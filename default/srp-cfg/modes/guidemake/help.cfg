echo ═══════════════ guide-maker commands ═══════════════
echo srp_guidemake       : 开启地图指南制作环境，不修改按键
echo srp_guidemake_keys  : 同时绑定 Z/X/C/V/6/Del/Enter
echo srp_guide_he        : 创建高爆弹标识
echo srp_guide_flash     : 创建闪光弹标识
echo srp_guide_smoke     : 创建烟雾弹标识
echo srp_guide_fire      : 创建燃烧弹与燃烧瓶标识
echo srp_guide_decoy     : 创建诱饵弹标识
echo srp_guide_delete    : 删除上一个节点组
echo srp_guide_save      : 保存为 mapguide
echo srp_guide_upload    : 提交 Workshop annotation
echo 标识默认使用 label；保存后在 annotations/local 中编辑文本。
echo ════════════════════════════════════════════════════
