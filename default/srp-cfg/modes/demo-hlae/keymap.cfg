// Demo/HLAE physical workspace. binddefaults intentionally runs first.
binddefaults                              // Start from the current Valve-shipped default keymap.
bind "uparrow" "rec;demo_resume;checkSetting"
bind "downarrow" "rec_end;demo_pause"
bind "t" "campath"
bind "y" "campath_draw"
bind "j" "dmsg"
bind "\" "block"
bind "=" "widefov"
bind "mouse5" "gear_up"
bind "mouse4" "gear_down"
bind "q" "demoui"
bind "p" "demo_togglepause"
bind "mouse3" "demo_togglepause"
bind "h" "toggle cl_draw_only_deathnotices"
bind "k" "toggle voice_enable;toggle voice_caster_enable"
bind "'" "toggle tv_listen_voice_indices -1 0"
bind "x" "toggle spec_show_xray 0 1"
bind "v" "toggle crosshair"
bind "b" "toggle cl_drawhud"
bind "n" "incrementvar cl_drawhud_force_radar -1 1 1"
bind "ralt" "toggle cl_teamid_overhead_mode 1 3"
bind "m" "mute"
bind "r" "mirv_input camera;echo 已进入运镜模式，按Esc退出使路径生效"
bind "u" "demo_marktick"
bind "i" "demo_gotomark"
bind "," "demo_goto -5s relative"
bind "." "demo_goto 5s relative"
bind "[" "mirv_campath edit start delta+0.25"
bind "]" "mirv_campath edit start delta-0.25"
bind "f5" "mirv_cmd addTick rec"
bind "f6" "mirv_cmd addTick rec_end"
bind "f7" "mirv_cmd print"
bind "f8" "mirv_cmd clear;echo >>> Cleared!"
bind "capslock" "mirv_campath add;echo 已添加机位"
bind "ins" "mirv_campath print"
bind "del" "mirv_campath clear;echo 已清除所有机位"
bind "kp_1" "mirv_campath remove 1"
bind "kp_2" "mirv_campath remove 2"
bind "kp_3" "mirv_campath remove 3"
bind "kp_4" "mirv_campath remove 4"
bind "kp_5" "mirv_campath remove 5"
bind "kp_6" "mirv_campath remove 6"
bind "kp_7" "mirv_campath remove 7"
bind "kp_8" "mirv_campath remove 8"
bind "kp_9" "mirv_campath remove 9"
bind "kp_0" "mirv_campath remove 0"
