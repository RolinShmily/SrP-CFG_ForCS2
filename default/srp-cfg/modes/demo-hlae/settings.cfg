// Demo/HLAE workspace settings. Requires launching CS2 through HLAE with FFmpeg configured.
clear
sv_cheats 1                              // Allow cinematic/debug controls.
cl_show_observer_crosshair 0             // Hide observed player crosshair.
cl_clock_correction 0                    // Reduce demo playback correction stutter.
tv_listen_voice_indices -1               // Enable player voice indices.
tv_listen_voice_indices_h -1             // Enable high 32-bit voice mask.
mirv_campath enabled 1                   // Enable camera paths.
mirv_input fov 90                        // Initial HLAE camera FOV.
mirv_reshade enabled 1                   // Enable ReShade integration.
mirv_streams record campath 1            // Record camera path alongside streams.
engine_no_focus_sleep 0                  // Keep full speed when unfocused.
mirv_streams record screen enabled 1     // Enable the screen stream.
mirv_streams record startMovieWav 1      // Record WAV audio with movie capture.
mirv_streams record fps 600              // High-rate source capture for blur sampling.
mirv_streams settings add ffmpeg mp4 "-c:v libx264 -pix_fmt yuv420p -preset ultrafast -crf 9 {QUOTE}{AFX_STREAM_PATH}\video.mp4{QUOTE}"
mirv_streams settings add sampler blur
mirv_streams settings edit blur settings mp4
mirv_streams settings edit blur strength 1
mirv_streams settings edit blur method rectangle
mirv_streams settings edit blur exposure 0.7
mirv_streams settings edit blur fps 60
mirv_streams record screen settings blur
campath_on                                // Reset camera path toggle state.
campath_draw_on                           // Show camera path by default.
r_show_build_info 0                       // Hide build information.
r_fullscreen_gamma 2.4                    // Capture gamma baseline.
fog_override 1                            // Clearer cinematic visibility.
hud_showtargetid 0                        // Hide target ID.
mp_display_kill_assists 0                 // Hide assists in kill feed.
mirv_cvar_unhide_all                      // Expose HLAE-relevant hidden ConVars.
demo_pause                                // Start from a paused demo.
cl_showpos 0                              // Hide position overlay.
cl_spec_show_bindings 0                   // Hide spectator binding hints.
cl_hud_telemetry_frametime_show 0         // Hide frame-time telemetry.
cl_hud_telemetry_net_misdelivery_show 0   // Hide network loss telemetry.
cl_hud_telemetry_ping_show 0              // Hide ping telemetry.
cl_grenadecrosshair_decoy 0               // Hide grenade crosshair family.
cl_grenadecrosshair_explosive 0
cl_grenadecrosshair_fire 0
cl_grenadecrosshair_flash 0
cl_grenadecrosshair_smoke 0
cl_teamcounter_playercount_instead_of_avatars 0 // Show player avatars.
sv_grenade_trajectory_prac_pipreview false      // Hide grenade PIP preview.
cl_hud_color 0                            // Default HUD color.
cl_radar_always_centered 1                // Center radar on observer.
cl_radar_scale 0.45                       // Cinematic radar scale.
cl_hud_radar_scale 1                      // Default HUD radar size.
cl_radar_icon_scale_min 0.6               // Default radar icon size.
cl_radar_rotate 1                         // Rotate radar.
echo [SrP-CFG] Demo/HLAE settings applied; use srp_demo_keys for the destructive keymap.
