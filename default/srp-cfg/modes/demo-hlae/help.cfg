echo ═══════════════ Demo/HLAE commands ═══════════════
echo srp_demo       : 应用 HLAE/录制设置，不修改物理按键
echo srp_demo_keys  : 先 binddefaults，再应用完整创作工作区键位
echo rec / rec_end  : 开始 / 结束 HLAE 录制
echo bluron / bluroff : 动态模糊 / 普通 MP4 录制
echo campath / campath_draw : 镜头路径启用与显示开关
echo gear_up / gear_down : Demo 播放速度档位
echo pos / time     : 将运镜位置 / 起始时间改为当前点
echo f10 ... f100   : 设置 HLAE 运镜 FOV
echo ass / mute / post / demoshow / demonoshow
echo 注意：需要通过 HLAE 启动，并正确配置 FFmpeg。
echo ══════════════════════════════════════════════════
