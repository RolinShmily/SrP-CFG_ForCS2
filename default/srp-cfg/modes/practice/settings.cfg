// Practice server and training settings. Physical keys are isolated in keymap.cfg.
sv_cheats                        1     // Allow training/debug commands.
sv_enablebunnyhopping            0     // Disable automatic bunny hopping by default.
sv_autobunnyhopping              0     // Disable automatic jump assistance.
sv_airaccelerate                 12    // Valve-style air acceleration baseline.
sv_alltalk                       1     // Enable all-talk for local training.
sv_talk_enemy_dead               1     // Allow hearing dead enemies.
sv_talk_enemy_living             1     // Allow hearing living enemies.
sv_talk_after_dying_time         99999 // Keep voice available after death.
sv_infinite_ammo                 2     // Infinite reserve ammo; magazines still reload.
sv_showimpacts                   0     // Impact markers start disabled.
sv_showimpacts_time              15    // Impact marker lifetime in seconds.
sv_grenade_trajectory_prac_pipreview 0 // Grenade picture-in-picture starts disabled.
sv_grenade_trajectory_prac_trailtime 8 // Local grenade trail lifetime.
sv_grenade_trajectory_time_spectator 8 // Spectator grenade trail lifetime.
spec_show_xray                   1     // Show x-ray for training observation.
ammo_grenade_limit_total         6     // Allow a full grenade set including decoy.
cl_versus_intro                  0     // Skip team intro cinematic.
cl_showpos                       0     // Speed/position overlay starts disabled.
bot_stop                         1     // Freeze bots until explicitly released.
bot_kick                               // Start with no bots.
bot_join_after_player            1     // Bots join after the player.
bot_chatter                      0     // Disable bot chatter.
mp_maxmoney                      99999 // Training money cap.
mp_startmoney                    99999 // Start with full training money.
mp_afterroundmoney               99999 // Refill money each round.
mp_buytime                       99999 // Unlimited buy time.
mp_warmuptime                    9999  // Long warmup before mp_warmup_end.
mp_roundtime                     60    // Long round timer.
mp_roundtime_defuse              60    // Long defuse round timer.
mp_freezetime                    1     // Minimal freeze time.
mp_round_restart_delay           2     // Short round restart delay.
mp_buy_anywhere                  1     // Buy anywhere.
mp_free_armor                    2     // Full armor on spawn.
mp_drop_knife_enable             1     // Allow dropping knives.
mp_drop_grenade_enable           1     // Allow dropping grenades.
mp_death_drop_grenade            0     // Do not drop grenades on death.
mp_death_drop_gun                1     // Drop guns so equipment remains manageable.
mp_death_drop_defuser            0     // Do not drop defuse kits.
mp_items_prohibited              0     // Remove item restrictions.
mp_solid_teammates               1     // Keep teammate collision.
mp_team_intro_time               0     // Skip team intro.
mp_humanteam                     any   // Allow joining either team.
mp_limitteams                    0     // Remove team size limit.
mp_autoteambalance               0     // Disable automatic team balance.
mp_autokick                      0     // Disable idle/team-kill autokick.
mp_spectators_max                9     // Allow spectators.
mp_forcecamera                   0     // Unrestricted spectator camera.
mp_respawn_immunitytime          0     // No respawn immunity.
mp_respawn_on_death_ct           1     // Instant CT respawn.
mp_respawn_on_death_t            1     // Instant T respawn.
mp_warmup_end                          // End warmup immediately.
mp_friendlyfire                  1     // Enable friendly fire for testing.
mp_weapons_allow_typecount       -1    // No weapon type purchase limit.
mp_t_default_primary weapon_ak47       // T default primary.
mp_t_default_secondary weapon_deagle   // T default secondary.
mp_ct_default_primary weapon_m4a1      // CT default primary.
mp_ct_default_secondary weapon_deagle  // CT default secondary.
mp_t_default_grenades  "weapon_flashbang weapon_hegrenade weapon_smokegrenade weapon_molotov weapon_decoy"
mp_ct_default_grenades "weapon_flashbang weapon_hegrenade weapon_smokegrenade weapon_incgrenade weapon_decoy"
sv_annotation_limits_max_rounds_per_half -1 // Keep local annotations visible.
sv_allow_annotations_access_level 2         // Allow local annotation access/editing.
echo [SrP-CFG] Practice settings applied; use srp_practice_keys for the workspace keymap.
