// Optional practice workspace keys. Use srp_practice for settings without these bindings.
bind "f1" "give item_assaultsuit;echo 已补甲!"
bind "f2" "toggle sv_regeneration_force_on 0 1;echo 自动回血状态updated!"
bind "f3" "switchperson"
bind "f4" "bot_add;mp_death_drop_gun 0;echo 已添加bot!"
bind "f5" "toggle bot_crouch;echo bot姿势updated!"
bind "f6" "toggle bot_mimic 0 -1;echo bot模仿状态updated!"
bind "f7" "toggle fov_cs_debug 0 30;echo 视野状态updated!"
bind "f8" "bot_kick;mp_death_drop_gun 1;echo bot已经被全部踢出!"
bind "f9" "toggle mp_teammates_are_enemies 0 1;echo 友伤状态切换!"
bind "f12" "toggle sv_enablebunnyhopping;toggle sv_autobunnyhopping;toggle cl_showpos;toggle sv_airaccelerate 1000 12;echo bhop状态已更新"
bind "0" "+Pucci"
bind "k" "toggle cl_showpos 0 1"
bind "l" "sv_rethrow_last_grenade;echo 已重新投掷!"
bind "n" "noclip;echo 飞行状态updated!"
bind "," "ent_fire smokegrenade_projectile kill;ent_fire flashbang_projectile kill;ent_fire incgrenade_projectile kill;ent_fire molotov_projectile kill;ent_fire hegrenade_projectile kill;ent_fire decoy_projectile kill;stopsound;echo 已清除道具!"
bind "." "toggle r_aoproxy_show 1 0;echo 切换实体显示updated!"
bind "/" "toggle sv_infinite_ammo 1 2;echo 弹夹容量状态切换!"
bind "ralt" "toggle cl_teamid_overhead_mode 1 3"
bind "uparrow" "switch-impactsNpreview"
bind "downarrow" "bot_kill;echo bot已全部处死!"
bind "rightarrow" "mp_restartgame 1;mp_death_drop_gun 1;echo 1秒后游戏将重新开始!"
bind "mouse5" "bot_stop 1;bot_place;echo 成功放置bot!"
