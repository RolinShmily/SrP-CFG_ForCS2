echo ═════════════════ practice commands ═════════════════
echo srp_practice       : 应用跑图服务器设置，不修改物理按键
echo srp_practice_keys  : 同时应用 practice/keymap.cfg
echo spawn              : 加载当前地图出生点传送别名
echo plant              : 允许任意位置安包
echo gkd / gg           : 标准实战模拟 / 恢复跑图模式
echo xray               : 开关 X 光观察
echo switchperson       : 第一/第三人称切换
echo switch-impactsNpreview : 弹痕与投掷物预览切换
echo 详细按键请查看 practice/keymap.cfg 或执行 srp_practice_keys 后参考文档。
