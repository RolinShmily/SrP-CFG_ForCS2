echo ═══════════════ crosshair-view commands ═══════════════
echo srp_crosshair_view       : 应用 c00 与 v00，不修改按键
echo srp_crosshair_view_keys  : 同时绑定 7/8、左方向键、下方向键
echo c00 ... c07              : 选择准星案例
echo v00 ... v07              : 选择持枪视角案例
echo keyc / keyv              : 轮换准星或持枪视角
echo whoamic / whoamiv        : 查看当前案例说明
echo red/orange/yellow/green/cyan/blue/purple/black/white/pink/brown/gray
echo switchthrow              : 开关投掷物准星
echo ═══════════════════════════════════════════════════════
