// Echo example: personal keymap differences layered on Default.
// Clear conflicting Default slots before assigning Echo's communication/inventory layout.
unbind "x"
unbind "c"
unbind "6"
unbind "v"
unbind "y"
unbind "i"
bind "z" "radio2;slot12"
bind "t" "+spray_menu"
bind "u" "messagemode2"
bind "y" "messagemode"
bind "mwheeldown" "invnext"
bind "mwheelup" "invprev"
bind "v" "switchhands"
