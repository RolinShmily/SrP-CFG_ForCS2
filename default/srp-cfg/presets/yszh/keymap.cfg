// YSZH example: personal keymap differences layered on Default.
// Mouse4 becomes crouch; voice returns to V; grenades use Q/X.
unbind "ctrl"
bind "mouse4" "+duck"
bind "x" "slot10"
bind "v" "+voicerecord"
unbind "mouse5"
bind "mwheeldown" "invnext"
bind "mwheelup" "invprev"
bind "h" "switchhands"
bind "t" "toggleradarscale"
bind "alt" "toggle cl_teamid_overhead_mode 1 3"
bind "n" "noclip"
unbind "q"
bind "q" "slot7"
