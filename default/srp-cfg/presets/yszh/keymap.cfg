// YSZH example: complete personal keymap.

// Movement and combat
bind "w" "+forward"
bind "s" "+back"
bind "a" "+left"
bind "d" "+right"
bind "mouse1" "+attack"
bind "mouse2" "+attack2"
bind "mouse_x" "yaw"
bind "mouse_y" "pitch"
bind "e" "+use"
bind "r" "+reload"
bind "f" "+lookatweapon"
bind "space" "+jump"
bind "mouse4" "+duck"
bind "tab" "+showscores"
bind "g" "drop"
bind "m" "teammenu"
bind "shift" "+sprint"
bind "b" "buymenu"

// Weapon and grenade slots
bind "1" "slot1"
bind "2" "slot2"
bind "3" "slot3"
bind "4" "slot4"
bind "5" "slot5"
bind "6" "slot9"
bind "z" "slot6"
bind "q" "slot7"
bind "c" "slot8"
bind "x" "slot10"
bind "'" "radio2;slot12"

// Communication and common actions
bind "y" "+spray_menu"
bind "u" "messagemode"
bind "i" "messagemode2"
bind "mwheeldown" "invnext"
bind "mwheelup" "invprev"
bind "v" "+voicerecord"
bind "mouse3" "player_ping"
bind "alt" "+radialradio"
bind "ralt" "noclip"
bind "`" "toggleconsole"
bind "h" "switchhands"
bind "t" "toggleradarscale"
bind "k" "say_team !drop"
bind "\" "say_team .hp"
bind "n" "toggle cl_teamid_overhead_mode 1 3"

// Buy shortcuts; F1/F2 remain intentionally unbound.
unbind "f1"
unbind "f2"
bind "del" "toggle volume 0.10 1.00"

// SrP feature and mode entry keys
bind "7" "keyc"
bind "8" "keyv"
bind "o" "srp_reload"
bind "j" "srp_knife"
bind "p" "srp_practice_keys"
