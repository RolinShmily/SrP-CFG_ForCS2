// Valve baseline for every archived ConVar currently touched by SrP-CFG.
// Defaults were verified against SteamDatabase/GameTracking-CS2 DumpSource2/convars.txt
// and the locally installed CS2 build on 2026-07-10.
// CS2 exposes no release-level command for resetting arbitrary client ConVars;
// reset_gameconvars is cheat-only, so this list stays explicit and auditable.
// This is intentionally explicit and auditable; unknown VCFG fields and cs2_video.txt are untouched.

// Mouse and viewmodel
sensitivity 1.25                         // Valve mouse sensitivity.
zoom_sensitivity_ratio 1                // Neutral scoped sensitivity ratio.
m_yaw 0.022                             // Standard horizontal mouse scale.
viewmodel_fov 60                        // Valve minimum/default viewmodel FOV.
viewmodel_offset_x 1                    // Default viewmodel horizontal offset.
viewmodel_offset_y 1                    // Default viewmodel depth offset.
viewmodel_offset_z -1                   // Default viewmodel vertical offset.
viewmodel_presetpos 1                   // Valve desktop viewmodel preset.

// Crosshair
crosshair true
cl_crosshair_drawoutline true
cl_crosshair_dynamic_maxdist_splitratio 1
cl_crosshair_dynamic_splitalpha_innermod 0
cl_crosshair_dynamic_splitalpha_outermod 1
cl_crosshair_dynamic_splitdist 3
cl_crosshair_friendly_warning 1
cl_crosshair_outlinethickness 1
cl_crosshair_recoil true
cl_crosshair_sniper_width 1
cl_crosshair_t false
cl_crosshairalpha 200
cl_crosshaircolor 5
cl_crosshaircolor_r 0
cl_crosshaircolor_g 255
cl_crosshaircolor_b 0
cl_crosshairdot false
cl_crosshairgap -2.2
cl_crosshairgap_useweaponvalue true
cl_crosshairsize 3.9
cl_crosshairstyle 2
cl_crosshairthickness 0.6
cl_crosshairusealpha true
cl_fixedcrosshairgap 3
cl_sniper_show_inaccuracy true
cl_observed_bot_crosshair 2
cl_show_observer_crosshair 2

// Grenade crosshair
cl_grenadecrosshair_decoy true
cl_grenadecrosshair_explosive true
cl_grenadecrosshair_fire true
cl_grenadecrosshair_flash true
cl_grenadecrosshair_keepusercrosshair true
cl_grenadecrosshair_smoke true
cl_grenadecrosshairdelay_decoy 2
cl_grenadecrosshairdelay_explosive 2
cl_grenadecrosshairdelay_fire 2
cl_grenadecrosshairdelay_flash 2
cl_grenadecrosshairdelay_smoke 2

// Radar and HUD
cl_radar_always_centered true
cl_radar_icon_scale_min 0.6
cl_radar_rotate true
cl_radar_scale 0.7
cl_radar_square_always false
cl_radar_square_with_scoreboard true
cl_hud_radar_background_alpha 0.627
cl_hud_radar_blur_background true
cl_hud_radar_map_additive true
cl_hud_radar_scale 1
cl_hud_color 0
hud_scaling 1
hud_showtargetid true
safezonex 1
safezoney 1
cl_showloadout true
cl_teamcounter_playercount_instead_of_avatars false
cl_teamid_overhead_colors_show true
cl_teamid_overhead_fade_near_crosshair 0.5
cl_teamid_overhead_mode 3
cl_teammate_colors_show 1
cl_color 0

// Telemetry and visual feedback
cl_hud_telemetry_frametime_show 1
cl_hud_telemetry_net_misdelivery_show 1
cl_hud_telemetry_ping_show 1
cl_predict_body_shot_fx false
cl_predict_head_shot_fx false
cl_predict_kill_ragdolls true
r_drawtracers_firstperson true
r_fullscreen_gamma 2.2
r_show_build_info true
func_break_max_pieces 15
spec_replay_autostart true
spec_show_xray 1
cl_versus_intro true

// Input and general behavior
cl_autohelp true
gameinstructor_enable false
cl_prefer_lefthanded false
cl_debounce_zoom true
cl_silencer_mode 0
cl_use_opens_buy_menu false
cl_dm_buyrandomweapons true
con_enable true
fps_max 120
engine_no_focus_sleep 20
mm_dedicated_search_maxping 150

// Audio
volume 1
snd_headphone_eq 0
snd_menumusic_volume 0.04
snd_roundstart_volume 0
snd_roundend_volume 0.16
snd_roundaction_volume 0
snd_mvp_volume 0.16
snd_mapobjective_volume 0.04
snd_tensecondwarning_volume 0.04
snd_deathcamera_volume 0.16
snd_mute_mvp_music_live_players false
snd_mute_losefocus true
voice_modenable true

// Chat wheel defaults
cl_radial_radio_tap_to_ping true
cl_radial_radio_tab 0
