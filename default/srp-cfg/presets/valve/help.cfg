echo ═════════════════ Valve baseline reset ═════════════════
echo srp_reset_valve          : 重置 SrP 涉及的偏好字段 + Valve 默认键位
echo srp_reset_valve_settings : 仅恢复 SrP 涉及的偏好与会话画面字段
echo srp_reset_valve_keys     : 仅执行游戏自带 binddefaults
echo srp_reset_valve_user     : Valve 基线后再执行 user/custom.cfg
echo srp_reload               : 重新注册 Runtime 并执行当前 user/custom.cfg
echo 边界：不会删除或覆盖 VCFG、_lastclouded、remotecache.vdf、cs2_video.txt。
echo 未被 SrP-CFG 管理的未知 ConVar 不会伪装成“已重置”。
