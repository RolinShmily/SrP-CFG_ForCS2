// VisionL example: personal keymap differences layered on Default.
// Replace Default grenade/chat/wheel bindings with VisionL's inventory layout.
unbind "v"
unbind "4"
unbind "t"
unbind "y"
unbind "mouse5"
unbind "z"
unbind "x"
unbind "c"
unbind "6"
unbind "mwheelup"
unbind "mwheeldown"
unbind "'"
unbind "u"
bind "mwheeldown" "invnext"
bind "mwheelup" "invprev"
bind "v" "+voicerecord"
bind "mouse3" "player_ping"
bind "z" "radio2;slot12"
bind "4" "slot4"
bind "t" "+spray_menu"
bind "y" "messagemode"
bind "u" "messagemode2"
bind "c" "toggleradarscale"
