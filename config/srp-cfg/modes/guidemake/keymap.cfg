// Optional guide-maker workspace keys. Use srp_guidemake for settings without these bindings.
bind "z" "srp_guide_he" // 选择高爆手雷指南类型。
bind "x" "srp_guide_flash" // 选择闪光弹指南类型。
bind "c" "srp_guide_smoke" // 选择烟雾弹指南类型。
bind "v" "srp_guide_fire" // 选择燃烧弹指南类型。
bind "6" "srp_guide_decoy" // 选择诱饵弹指南类型。
bind "del" "srp_guide_delete" // 删除当前指南标记。
bind "enter" "srp_guide_save" // 保存当前指南标记。
