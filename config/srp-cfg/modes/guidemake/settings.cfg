// Guide-maker mode settings. Physical keys are isolated in keymap.cfg.
sv_cheats 1                                  // 允许本地地图指南制作命令。
sv_allow_annotations_access_level 2         // 允许查看与编辑 Annotation。
annotation_auto_load 1                      // 自动载入本地地图指南。
echo [SrP-CFG] Guide-maker settings applied; use srp_guidemake_keys for the workspace keymap. // 在控制台输出应用完成提示。
