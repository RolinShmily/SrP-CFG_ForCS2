echo ═════════════════ 地图指南制作帮助 ════════════════
echo srp_guidemake      : 开启本地 Annotation 编辑环境，不修改物理键位。
echo srp_guidemake_keys : 同时绑定 Z/X/C/V/6、Delete 和 Enter，作为指南制作工作区。
echo ── 创建节点 ──
echo srp_guide_he    : 创建高爆手雷 label 节点；Z 默认绑定该命令。
echo srp_guide_flash : 创建闪光弹 label 节点；X 默认绑定该命令。
echo srp_guide_smoke : 创建烟雾弹 label 节点；C 默认绑定该命令。
echo srp_guide_fire  : 同时创建燃烧瓶与燃烧弹 label 节点；V 默认绑定该命令。
echo srp_guide_decoy : 创建诱饵弹 label 节点；6 默认绑定该命令。
echo ── 管理与保存 ──
echo srp_guide_delete：删除上一个节点组；Delete 默认绑定该命令。
echo srp_guide_save  ：保存当前地图的 mapguide；Enter 默认绑定该命令。
echo srp_guide_upload：调用 workshop_annotation_submit 提交 Workshop Annotation。
echo 保存后可在 csgo/annotations/local 中编辑生成文件的文字、位置和其他字段。
echo 该模式需要本地服务器允许 Annotation 编辑；_keys 会覆盖上述制作按键。
echo ═════════════════════════════════════════════════
