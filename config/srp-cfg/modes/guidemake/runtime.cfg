// Persistent guide-maker commands. No cheat state or physical key is changed here.
alias "fire" "annotation_create grenade molotov label;annotation_create grenade incendiary label" // 注册 alias fire：依次执行 annotation_create、annotation_create。
alias "srp_guide_upload" "workshop_annotation_submit" // 将 alias srp_guide_upload 转发到 workshop_annotation_submit。
alias "srp_guide_he" "annotation_create grenade he label" // 注册 alias srp_guide_he：执行 annotation_create grenade he label。
alias "srp_guide_flash" "annotation_create grenade flash label" // 注册 alias srp_guide_flash：执行 annotation_create grenade flash label。
alias "srp_guide_smoke" "annotation_create grenade smoke label" // 注册 alias srp_guide_smoke：执行 annotation_create grenade smoke label。
alias "srp_guide_fire" "fire" // 将 alias srp_guide_fire 转发到 fire。
alias "srp_guide_decoy" "annotation_create grenade decoy label" // 注册 alias srp_guide_decoy：执行 annotation_create grenade decoy label。
alias "srp_guide_delete" "annotation_delete_previous_node_set" // 将 alias srp_guide_delete 转发到 annotation_delete_previous_node_set。
alias "srp_guide_save" "annotation_save mapguide" // 注册 alias srp_guide_save：执行 annotation_save mapguide。
