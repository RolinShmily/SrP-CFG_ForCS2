echo ═══════════════════ 跑图练习帮助 ══════════════════
echo srp_practice      : 应用训练服务器设置，不修改物理键位。
echo srp_practice_keys : 先应用训练设置，再执行 practice/keymap.cfg 覆盖训练工作区键位。
echo ── 模式状态 ──
echo 设置包括 sv_cheats 1、无限备弹、Bot 冻结/移除、任意购买、快速复活和长回合时间。
echo gkd：切回接近标准实战的复活/弹药/购买状态，并关闭 sv_cheats。
echo gg ：恢复跑图状态，包括 sv_cheats、复活、弹痕、无限弹药与任意购买。
echo plant：允许任意地点安包；xray：切换观察 X 光；switchperson：切换第一/第三人称。
echo switch-impactsNpreview：同时切换弹痕显示与投掷物轨迹画中画。
echo ── 出生点 ──
echo spawn：加载地图名称 alias；先输入 dust2/mirage 等地图名，再输入 CT1、T1 等出生点。
echo 地图 alias 会先清空旧出生点定义，避免切图后沿用上一张地图坐标。
echo ── 主要训练键位 ──
echo F1补甲；F2回血；F3视角；F4/F8添加/移除Bot；F12连跳环境；N飞行；L重投。
echo 逗号清理投掷物；斜杠切换无限弹药模式；上方向键切弹痕/预览；MOUSE5放置Bot。
echo 注意：_keys 会覆盖上述按键；退出后应重新应用个人 Preset 或执行 srp_reload。
echo ═══════════════════════════════════════════════════
