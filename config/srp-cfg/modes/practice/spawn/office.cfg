// Office出生点配置
// 初始化所有出生点
exec srp-cfg/modes/practice/spawn/init_spawns.cfg // 加载 srp-cfg/modes/practice/spawn/init_spawns.cfg，继续执行该模块配置链。

// 设置可用的出生点
alias "CT1" "setpos_exact 1800 2100 -100;setang 0 270 0;echo 已传送至: Office - CT点 1号位置" // 注册 CT1 出生点：设置精确坐标与视角，并输出传送目标。
alias "CT2" "setpos_exact 1800 2000 -100;setang 0 270 0;echo 已传送至: Office - CT点 2号位置" // 注册 CT2 出生点：设置精确坐标与视角，并输出传送目标。
alias "CT3" "setpos_exact 1800 1900 -100;setang 0 270 0;echo 已传送至: Office - CT点 3号位置" // 注册 CT3 出生点：设置精确坐标与视角，并输出传送目标。
alias "CT4" "setpos_exact 1700 2050 -100;setang 0 270 0;echo 已传送至: Office - CT点 4号位置" // 注册 CT4 出生点：设置精确坐标与视角，并输出传送目标。
alias "CT5" "setpos_exact 1700 1950 -100;setang 0 270 0;echo 已传送至: Office - CT点 5号位置" // 注册 CT5 出生点：设置精确坐标与视角，并输出传送目标。

alias "T1" "setpos_exact -1800 1000 -100;setang 0 90 0;echo 已传送至: Office - T点 1号位置" // 注册 T1 出生点：设置精确坐标与视角，并输出传送目标。
alias "T2" "setpos_exact -1800 900 -100;setang 0 90 0;echo 已传送至: Office - T点 2号位置" // 注册 T2 出生点：设置精确坐标与视角，并输出传送目标。
alias "T3" "setpos_exact -1800 800 -100;setang 0 90 0;echo 已传送至: Office - T点 3号位置" // 注册 T3 出生点：设置精确坐标与视角，并输出传送目标。
alias "T4" "setpos_exact -1700 950 -100;setang 0 90 0;echo 已传送至: Office - T点 4号位置" // 注册 T4 出生点：设置精确坐标与视角，并输出传送目标。
alias "T5" "setpos_exact -1700 850 -100;setang 0 90 0;echo 已传送至: Office - T点 5号位置" // 注册 T5 出生点：设置精确坐标与视角，并输出传送目标。

echo "地图: Office | CT: 5个出生点 | T: 5个出生点"
