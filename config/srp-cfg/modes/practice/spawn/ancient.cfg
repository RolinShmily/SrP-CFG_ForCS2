// Ancient出生点配置
// 初始化所有出生点
exec srp-cfg/modes/practice/spawn/init_spawns.cfg // 加载 srp-cfg/modes/practice/spawn/init_spawns.cfg，继续执行该模块配置链。

// 设置可用的出生点
alias "CT1" "setpos_exact -192 1696 32;setang 0 270 0;echo 已传送至: Ancient - CT点 1号位置" // 注册 CT1 出生点：设置精确坐标与视角，并输出传送目标。
