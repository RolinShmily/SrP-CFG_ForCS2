// Optional practice workspace keys. Use srp_practice for settings without these bindings.
bind "f1" "srp_prac_armor" // 补充头盔与护甲。
bind "f2" "srp_prac_regen" // 切换自动回血。
bind "f3" "switchperson" // 切换第一人称与第三人称视角。
bind "f4" "srp_prac_bot_add" // 添加 Bot 并关闭 Bot 死亡掉枪。
bind "f5" "srp_prac_bot_crouch" // 切换 Bot 蹲伏。
bind "f6" "srp_prac_bot_mimic" // 切换 Bot 镜像模仿。
bind "f7" "srp_prac_fov" // 切换调试广角视野。
bind "f8" "srp_prac_bot_kick" // 踢出全部 Bot 并恢复死亡掉枪。
bind "f9" "srp_prac_teammates_enemies" // 切换队友互为敌人。
bind "f10" "srp_prac_bhop" // 切换连跳训练环境。
bind "0" "+Pucci" // 按住时加速游戏时间。
bind "k" "srp_prac_showpos" // 切换速度与坐标显示。
bind "l" "srp_prac_rethrow" // 重新投掷上一颗投掷物。
bind "n" "srp_prac_noclip" // 切换飞行模式。
bind "," "srp_prac_clear_grenades" // 清除场上全部投掷物并停止残留声音。
bind "." "srp_prac_aoproxy" // 切换实体 AO 代理显示。
bind "/" "srp_prac_infammo" // 切换无限弹匣与无限备弹。
bind "ralt" "srp_prac_teamid" // 切换队友头顶标识模式。
bind "uparrow" "switch-impactsNpreview" // 切换弹痕与投掷物轨迹预览。
bind "downarrow" "srp_prac_bot_kill" // 处死全部 Bot。
bind "rightarrow" "srp_prac_restart" // 一秒后重启训练回合。
bind "mouse5" "srp_prac_bot_place" // 在准星位置放置并冻结 Bot。
