// Optional practice workspace keys. Use srp_practice for settings without these bindings.
bind "f1" "give item_assaultsuit;echo 已补甲!" // 补充头盔与护甲。
bind "f2" "toggle sv_regeneration_force_on 0 1;echo 自动回血状态updated!" // 切换自动回血。
bind "f3" "switchperson" // 切换第一人称与第三人称视角。
bind "f4" "bot_add;mp_death_drop_gun 0;echo 已添加bot!" // 添加 Bot 并关闭 Bot 死亡掉枪。
bind "f5" "toggle bot_crouch;echo bot姿势updated!" // 切换 Bot 蹲伏。
bind "f6" "toggle bot_mimic 0 -1;echo bot模仿状态updated!" // 切换 Bot 镜像模仿。
bind "f7" "toggle fov_cs_debug 0 30;echo 视野状态updated!" // 切换调试广角视野。
bind "f8" "bot_kick;mp_death_drop_gun 1;echo bot已经被全部踢出!" // 踢出全部 Bot 并恢复死亡掉枪。
bind "f9" "toggle mp_teammates_are_enemies 0 1;echo 友伤状态切换!" // 切换队友互为敌人。
bind "f12" "toggle sv_enablebunnyhopping;toggle sv_autobunnyhopping;toggle cl_showpos;toggle sv_airaccelerate 1000 12;echo bhop状态已更新" // 切换连跳训练环境。
bind "0" "+Pucci" // 按住时加速游戏时间。
bind "k" "toggle cl_showpos 0 1" // 切换速度与坐标显示。
bind "l" "sv_rethrow_last_grenade;echo 已重新投掷!" // 重新投掷上一颗投掷物。
bind "n" "noclip;echo 飞行状态updated!" // 切换飞行模式。
bind "," "ent_fire smokegrenade_projectile kill;ent_fire flashbang_projectile kill;ent_fire incgrenade_projectile kill;ent_fire molotov_projectile kill;ent_fire hegrenade_projectile kill;ent_fire decoy_projectile kill;stopsound;echo 已清除道具!" // 清除场上全部投掷物并停止残留声音。
bind "." "toggle r_aoproxy_show 1 0;echo 切换实体显示updated!" // 切换实体 AO 代理显示。
bind "/" "toggle sv_infinite_ammo 1 2;echo 弹夹容量状态切换!" // 切换无限弹匣与无限备弹。
bind "ralt" "toggle cl_teamid_overhead_mode 1 3" // 切换队友头顶标识模式。
bind "uparrow" "switch-impactsNpreview" // 切换弹痕与投掷物轨迹预览。
bind "downarrow" "bot_kill;echo bot已全部处死!" // 处死全部 Bot。
bind "rightarrow" "mp_restartgame 1;mp_death_drop_gun 1;echo 1秒后游戏将重新开始!" // 一秒后重启训练回合。
bind "mouse5" "bot_stop 1;bot_place;echo 成功放置bot!" // 在准星位置放置并冻结 Bot。
