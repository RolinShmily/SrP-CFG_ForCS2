// Persistent practice command vocabulary. No server state or physical key is changed here.
alias "+Pucci" "host_timescale 25"          // Hold: accelerate time.
alias "-Pucci" "host_timescale 1"           // Release: restore normal time.
alias "switch-impactsNpreview" "impactsNpreview-on" // 将 alias switch-impactsNpreview 转发到 impactsNpreview-on。
alias "impactsNpreview-on" "sv_showimpacts 1;sv_grenade_trajectory_prac_pipreview 1;alias switch-impactsNpreview impactsNpreview-off;echo 已开启弹痕显示和投掷物预览!" // 注册 alias impactsNpreview-on：依次执行 sv_showimpacts、sv_grenade_trajectory_prac_pipreview、alias、echo，并提示“已开启弹痕显示和投掷物预览”。
alias "impactsNpreview-off" "sv_showimpacts 0;sv_grenade_trajectory_prac_pipreview 0;alias switch-impactsNpreview impactsNpreview-on;echo 已关闭弹痕显示和投掷物预览!" // 注册 alias impactsNpreview-off：依次执行 sv_showimpacts、sv_grenade_trajectory_prac_pipreview、alias、echo，并提示“已关闭弹痕显示和投掷物预览”。
alias "switchperson" "switchperson-third" // 将 alias switchperson 转发到 switchperson-third。
alias "switchperson-third" "thirdperson;alias switchperson switchperson-first;echo 已切换第三人称视角!" // 注册 alias switchperson-third：依次执行 thirdperson、alias、echo，并提示“已切换第三人称视角”。
alias "switchperson-first" "firstperson;alias switchperson switchperson-third;echo 已切换第一人称视角!" // 注册 alias switchperson-first：依次执行 firstperson、alias、echo，并提示“已切换第一人称视角”。
alias "spawn" "exec srp-cfg/modes/practice/spawn/spawn.cfg" // Load map spawn aliases.
alias "gkd" "mp_respawn_on_death_ct 0;mp_respawn_on_death_t 0;sv_showimpacts 0;sv_infinite_ammo 0;sv_alltalk 0;mp_buy_anywhere 0;mp_freezetime 4;mp_restartgame 1;sv_cheats 0;echo 标准实战模式!" // 注册 alias gkd：依次执行 mp_respawn_on_death_ct、mp_respawn_on_death_t、sv_showimpacts、sv_infinite_ammo、sv_alltalk、mp_buy_anywhere 等动作，并提示“标准实战模式”。
alias "gg" "sv_cheats 1;mp_respawn_on_death_ct 1;mp_respawn_on_death_t 1;sv_showimpacts 1;sv_infinite_ammo 1;sv_alltalk 1;mp_buy_anywhere 1;mp_freezetime 1;echo 恢复跑图模式!" // 注册 alias gg：依次执行 sv_cheats、mp_respawn_on_death_ct、mp_respawn_on_death_t、sv_showimpacts、sv_infinite_ammo、sv_alltalk 等动作，并提示“恢复跑图模式”。
alias "plant" "mp_plant_c4_anywhere 1;echo 任意处安包!" // 注册 alias plant：依次执行 mp_plant_c4_anywhere、echo，并提示“任意处安包”。
alias "xray" "toggle spec_show_xray 0 1;echo X光状态updated!" // 注册 alias xray：依次执行 toggle、echo，并提示“X光状态updated”。
