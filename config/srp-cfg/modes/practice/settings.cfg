// Practice server and training settings. Physical keys are isolated in keymap.cfg.
sv_cheats                        1     // 允许本地训练与调试命令。
sv_enablebunnyhopping            0     // 默认关闭服务器自动连跳。
sv_autobunnyhopping              0     // 默认关闭自动跳跃辅助。
sv_airaccelerate                 12    // 使用 Valve 常规空中加速基线。
sv_alltalk                       1     // 本地训练中启用全体语音。
sv_talk_enemy_dead               1     // 允许听见已死亡敌人。
sv_talk_enemy_living             1     // 允许听见存活敌人。
sv_talk_after_dying_time         99999 // 死亡后持续允许语音。
sv_infinite_ammo                 2     // 无限备弹，但弹匣仍需换弹。
sv_showimpacts                   0     // 默认关闭弹痕落点显示。
sv_showimpacts_time              15    // 弹痕落点保留秒数。
sv_grenade_trajectory_prac_pipreview 0 // 默认关闭投掷物轨迹画中画。
sv_grenade_trajectory_prac_trailtime 8 // 本地玩家投掷轨迹保留秒数。
sv_grenade_trajectory_time_spectator 8 // 观察视角投掷轨迹保留秒数。
spec_show_xray                   1     // 训练观察时启用 X 光。
ammo_grenade_limit_total         6     // 允许携带包含诱饵弹的完整投掷物组。
cl_versus_intro                  0     // 跳过队伍介绍动画。
cl_showpos                       0     // 默认隐藏速度与坐标信息。
bot_stop                         1     // 冻结 Bot，等待手动放置或释放。
bot_kick                               // 启动时移除全部 Bot。
bot_join_after_player            1     // 玩家加入后才允许 Bot 加入。
bot_chatter                      0     // 关闭 Bot 语音闲聊。
mp_maxmoney                      99999 // 训练模式金钱上限。
mp_startmoney                    99999 // 出生时拥有训练金钱上限。
mp_afterroundmoney               99999 // 每回合结束补满训练金钱。
mp_buytime                       99999 // 近似无限购买时间。
mp_warmuptime                    9999  // 设置较长热身时间，随后会主动结束热身。
mp_roundtime                     60    // 普通回合最长 60 分钟。
mp_roundtime_defuse              60    // 拆弹回合最长 60 分钟。
mp_freezetime                    1     // 回合冻结时间 1 秒。
mp_round_restart_delay           2     // 回合结束后 2 秒重启。
mp_buy_anywhere                  1     // 允许在任意位置购买。
mp_free_armor                    2     // 出生时免费获得头盔与护甲。
mp_drop_knife_enable             1     // 允许丢弃匕首。
mp_drop_grenade_enable           1     // 允许丢弃投掷物。
mp_death_drop_grenade            0     // 死亡时不掉落投掷物。
mp_death_drop_gun                1     // 死亡时掉落枪械，便于训练管理装备。
mp_death_drop_defuser            0     // 死亡时不掉落拆弹器。
mp_items_prohibited              0     // 取消物品禁用限制。
mp_solid_teammates               1     // 保留队友碰撞。
mp_team_intro_time               0     // 关闭队伍介绍等待时间。
mp_humanteam                     any   // 允许玩家加入任意队伍。
mp_limitteams                    0     // 取消队伍人数差限制。
mp_autoteambalance               0     // 关闭自动平衡队伍。
mp_autokick                      0     // 关闭挂机与误伤自动踢出。
mp_spectators_max                9     // 最多允许 9 名观察者。
mp_forcecamera                   0     // 不限制观察摄像机。
mp_respawn_immunitytime          0     // 关闭复活无敌时间。
mp_respawn_on_death_ct           1     // CT 死亡后立即复活。
mp_respawn_on_death_t            1     // T 死亡后立即复活。
mp_warmup_end                          // 立即结束热身阶段。
mp_friendlyfire                  1     // 启用友军伤害以便测试。
mp_weapons_allow_typecount       -1    // 取消同类型武器购买数量限制。
mp_t_default_primary weapon_ak47       // T 方默认主武器为 AK-47。
mp_t_default_secondary weapon_deagle   // T 方默认副武器为沙漠之鹰。
mp_ct_default_primary weapon_m4a1      // CT 方默认主武器为 M4A1-S。
mp_ct_default_secondary weapon_deagle  // CT 方默认副武器为沙漠之鹰。
mp_t_default_grenades  "weapon_flashbang weapon_hegrenade weapon_smokegrenade weapon_molotov weapon_decoy" // 设置 T 方训练出生时携带的完整投掷物。
mp_ct_default_grenades "weapon_flashbang weapon_hegrenade weapon_smokegrenade weapon_incgrenade weapon_decoy" // 设置 CT 方训练出生时携带的完整投掷物。
sv_annotation_limits_max_rounds_per_half -1 // 让本地地图指南持续可见。
sv_allow_annotations_access_level 2         // 允许查看与编辑本地地图指南。
echo [SrP-CFG] Practice settings applied; use srp_practice_keys for the workspace keymap. // 在控制台输出应用完成提示。
