// Persistent preview-mode command vocabulary. No camera state or physical key is changed here.
alias "depre" "cl_drawhud 1;r_dof_override 0;r_dof_override_near_blurry 0;fov_cs_debug 0;cl_lock_camera 0;echo 已恢复预览模式修改的画面状态!" // 注册 alias depre：依次执行 cl_drawhud、r_dof_override、r_dof_override_near_blurry、fov_cs_debug、cl_lock_camera、echo，并提示“已恢复预览模式修改的画面状态”。
alias "changeblur" "blur1" // 将 alias changeblur 转发到 blur1。
alias "blur0" "r_dof_override_near_blurry 3000;alias changeblur blur1" // 注册 alias blur0：依次执行 r_dof_override_near_blurry、alias。
alias "blur1" "r_dof_override_near_blurry 50;alias changeblur blur2" // 注册 alias blur1：依次执行 r_dof_override_near_blurry、alias。
alias "blur2" "r_dof_override_near_blurry 100;alias changeblur blur3" // 注册 alias blur2：依次执行 r_dof_override_near_blurry、alias。
alias "blur3" "r_dof_override_near_blurry 500;alias changeblur blur4" // 注册 alias blur3：依次执行 r_dof_override_near_blurry、alias。
alias "blur4" "r_dof_override_near_blurry 1000;alias changeblur blur0" // 注册 alias blur4：依次执行 r_dof_override_near_blurry、alias。
alias "changeang++" "ang1" // 将 alias changeang++ 转发到 ang1。
alias "ang0+" "setang pitch yaw 0;alias changeang++ ang1" // 注册 alias ang0+：依次执行 setang、alias。
alias "ang1" "setang pitch yaw 10;alias changeang++ ang2" // 注册 alias ang1：依次执行 setang、alias。
alias "ang2" "setang pitch yaw 20;alias changeang++ ang3" // 注册 alias ang2：依次执行 setang、alias。
alias "ang3" "setang pitch yaw 30;alias changeang++ ang4" // 注册 alias ang3：依次执行 setang、alias。
alias "ang4" "setang pitch yaw 40;alias changeang++ ang5" // 注册 alias ang4：依次执行 setang、alias。
alias "ang5" "setang pitch yaw 50;alias changeang++ ang0+" // 注册 alias ang5：依次执行 setang、alias。
alias "changeang--" "ang-1" // 将 alias changeang-- 转发到 ang-1。
alias "ang0-" "setang pitch yaw 0;alias changeang-- ang-1" // 注册 alias ang0-：依次执行 setang、alias。
alias "ang-1" "setang pitch yaw -10;alias changeang-- ang-2" // 注册 alias ang-1：依次执行 setang、alias。
alias "ang-2" "setang pitch yaw -20;alias changeang-- ang-3" // 注册 alias ang-2：依次执行 setang、alias。
alias "ang-3" "setang pitch yaw -30;alias changeang-- ang-4" // 注册 alias ang-3：依次执行 setang、alias。
alias "ang-4" "setang pitch yaw -40;alias changeang-- ang-5" // 注册 alias ang-4：依次执行 setang、alias。
alias "ang-5" "setang pitch yaw -50;alias changeang-- ang0-" // 注册 alias ang-5：依次执行 setang、alias。
alias "changefov" "fov1" // 将 alias changefov 转发到 fov1。
alias "fov0" "fov_cs_debug 0;alias changefov fov1" // 注册 alias fov0：依次执行 fov_cs_debug、alias。
