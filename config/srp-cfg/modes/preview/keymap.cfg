// Optional preview workspace keys. Use srp_preview for settings without these bindings.
bind "z" "srp_preview_hud" // 切换预览 HUD。
bind "x" "srp_preview_lock" // 切换预览摄像机锁定。
bind "c" "srp_preview_dof" // 切换预览景深。
bind "v" "changeblur" // 循环切换预览景深强度。
bind "downarrow" "changefov" // 循环切换预览视野。
bind "-" "changeang--" // 向下调整预览检视角度。
bind "=" "changeang++" // 向上调整预览检视角度。
