echo ═══════════════════ 饰品预览帮助 ══════════════════
echo srp_preview      : 应用预览画面状态，不修改物理键位。
echo srp_preview_keys : 同时覆盖 Z/X/C/V、下方向键、- 与 =，作为预览工作区。
echo ── 应用的画面状态 ──
echo 隐藏 HUD，启用景深覆盖，将 debug FOV 设为 110，并锁定摄像机方向。
echo Z：切换 HUD；X：切换相机锁定；C：切换景深；V：循环景深距离。
echo 下方向键：循环 debug FOV；- / =：向负/正方向循环相机滚转角。
echo changeblur：在多个近景模糊距离间循环；changefov：在预设 FOV 档位间循环。
echo changeang-- / changeang++：分别向负方向或正方向调整 cam_idealyaw。
echo depre：恢复本模式修改的 HUD、雷达强制、景深、FOV、相机锁定与滚转角。
echo 注意：depre 只恢复预览模块负责的画面字段；物理键位仍需重新应用个人 Preset。
echo ═════════════════════════════════════════════════
