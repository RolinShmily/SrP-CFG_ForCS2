// Preview/camera settings. Physical keys are isolated in keymap.cfg.
sv_cheats 1                              // 允许调试摄像机与画面命令。
cl_draw_only_deathnotices 0              // 先退出精简 HUD 状态。
cl_drawhud_force_radar 0                 // 允许本模式正常控制雷达显示。
cl_drawhud 0                             // 隐藏 HUD 以便截图或录制。
r_dof_override 1                         // 启用景深覆盖。
r_dof_override_near_blurry 1000          // 设置初始近景模糊距离。
fov_cs_debug 110                         // 使用广角第一人称调试 FOV。
cl_lock_camera 1                         // 锁定摄像机朝向。
echo [SrP-CFG] Preview settings applied; use depre to restore its visual changes. // 在控制台输出应用完成提示。
