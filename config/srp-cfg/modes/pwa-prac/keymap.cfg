bind "mouse5" "srp_pwa_prac_bot_add" // 在当前玩家位置添加 Bot
bind "rshift" "srp_pwa_prac_bot_add_crouch" // 添加一个蹲着的bot
bind "downarrow" "srp_pwa_prac_bot_kick" // 清除光标指向的bot
bind "k" "srp_pwa_prac_bot_kickall" // 清除所有bot
bind "rightarrow" "srp_pwa_prac_restart" // 重置游戏
bind "uparrow" "srp_pwa_prac_switch_preview;srp_pwa_prac_switch_impacts" // 开关预览窗 开关子弹落点
bind "," "srp_pwa_prac_clear_smokes" // 清除烟雾弹 
bind "." "srp_pwa_prac_switch_flash" // 开关闪光弹效果
bind "f2" "srp_pwa_prac_god" // 开关上帝模式
bind "n" "srp_pwa_prac_noclip" // 切换飞行模式。
bind "f9" "srp_pwa_prac_team_attack" // 开关友伤
bind "j" "srp_pwa_prac_rethrow_position" // 回到上一次投掷位置
bind "l" "srp_pwa_prac_rethrow_1" // 重新投掷上一颗投掷物
bind "f5" "srp_pwa_prac_rethrow_2" // 重新投掷倒数第二颗投掷物
bind "f6" "srp_pwa_prac_rethrow_3" // 重新投掷倒数第三颗投掷物
bind "f7" "srp_pwa_prac_rethrow_4" // 重新投掷倒数第四颗投掷物
bind "f8" "srp_pwa_prac_rethrow_5" // 重新投掷倒数第五颗投掷物
bind "f3" "srp_pwa_prac_follow_grenades" // 开关追踪道具
bind "f1" "srp_pwa_prac_grenades" // 开关道具训练
bind "f4" "srp_pwa_prac_menus" // 开关指令墙
bind "f10" "srp_pwa_prac_breaks" // 破坏物品
bind "f11" "srp_pwa_prac_recover" // 恢复物品
bind "n" "srp_pwa_prac_noclip" // 切换飞行
bind "ralt" "srp_pwa_prac_teamid" // 切换队友头顶标识