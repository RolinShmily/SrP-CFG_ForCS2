echo ═════════════════ 完美世界跑图练习帮助 ════════════════
echo srp_pwa_prac      : 提示应用，不修改物理键位。
echo srp_pwa_prac_keys : 执行 pwa-prac/keymap.cfg 覆盖训练工作区键位。
echo ── 完美世界专属指令 ──
echo 完美跑图依赖服务端指令 (.bot, .kick, .qy 等)，此模式为其映射了对应按键。
echo ── 主要训练指令 (结合 _keys 工作区默认键位) ──
echo 投掷物复现: L(上1颗), F5(倒数第2), F6(倒数第3), F7(倒数第4), F8(倒数第5)
echo Bot控制: MOUSE4(添加Bot), DOWN(清除指向Bot), K(清除所有)
echo 辅助开关: F1(道具训练), F2(上帝模式), F3(追踪道具), F4(指令墙), N(飞行)
echo 环境重置: RIGHT(重置游戏), F9(友伤), F10(破坏物品), F11(恢复物品)
echo 视觉效果: UP(预览窗+子弹落点), ,(清烟+开关闪光)
echo 注意：_keys 会覆盖上述按键；退出后应重新应用个人 Preset 或执行 srp_reload。
echo ═══════════════════════════════════════════════════
