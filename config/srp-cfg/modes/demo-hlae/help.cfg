echo ═════════════════ Demo / HLAE 帮助 ════════════════
echo 使用条件：必须通过 HLAE 启动 CS2，并提前配置 FFmpeg 与 mirv_streams。
echo srp_demo      : 应用录制、Campath、画面与遥测设置，不修改物理键位。
echo srp_demo_keys : 先执行 binddefaults，再写入完整 Demo/HLAE 工作区键位；属于破坏性键位操作。
echo ── 录制 ──
echo srp_demo_record_start / _end : 开始 / 结束录制与播放 (UP/DOWN)。
echo bluron / bluroff: 动态模糊采样录制 / 普通 MP4 录制。
echo checkSetting    : 输出当前 mirv_streams 录制 FPS。
echo ── 运镜与播放 ──
echo srp_demo_campath / _draw：切换镜头路径启用状态与路径显示 (T/Y)。
echo pos / time：把当前 Campath 节点位置 / 起始时间修改为当前状态。
echo srp_demo_gear_up / _down：在倍速档位间切换 (MOUSE5/MOUSE4)。
echo f10 ... f100：把 HLAE 输入 FOV 设置为对应的 10–100 数值。
echo srp_demo_widefov/dmsg/block/mute 等：录制辅助开关。
echo srp_demo_ui/togglepause/marktick/gotomark 等：基础播放控制。
echo ── 键位与恢复 ──
echo _keys 会从 binddefaults 开始，覆盖方向键、录制键、播放键、HUD/语音/X光等大量键位。
echo 退出后执行 srp_reload；只有 user/custom.cfg 含 Preset 或个人 bind 时才会重新写回对应键位。
echo 如果未配置恢复键位，请在游戏设置中重置或执行自己的 Preset 起点。
echo ═════════════════════════════════════════════════
