// Demo/HLAE physical workspace. binddefaults intentionally runs first.
binddefaults                              // 先恢复当前 CS2 版本自带的默认键位，避免模式残留冲突。
bind "uparrow" "rec;demo_resume;checkSetting" // 开始 HLAE 录制并继续播放 Demo。
bind "downarrow" "rec_end;demo_pause" // 结束 HLAE 录制并暂停 Demo。
bind "t" "campath" // 切换镜头路径启用状态。
bind "y" "campath_draw" // 切换镜头路径显示。
bind "j" "dmsg" // 切换当前观察玩家的击杀信息。
bind "\" "block" // 切换击杀信息显示。
bind "=" "widefov" // 切换广角 FOV。
bind "mouse5" "gear_up" // 提高 Demo 播放速度。
bind "mouse4" "gear_down" // 降低 Demo 播放速度。
bind "q" "demoui" // 打开 Demo 控制面板。
bind "p" "demo_togglepause" // 暂停或继续 Demo。
bind "mouse3" "demo_togglepause" // 暂停或继续 Demo。
bind "h" "toggle cl_draw_only_deathnotices" // 切换精简 HUD。
bind "k" "toggle voice_enable;toggle voice_caster_enable" // 切换游戏与解说语音。
bind "'" "toggle tv_listen_voice_indices -1 0" // 切换 Demo 玩家语音。
bind "x" "toggle spec_show_xray 0 1" // 切换观察 X 光。
bind "v" "toggle crosshair" // 切换准星显示。
bind "b" "toggle cl_drawhud" // 切换完整 HUD。
bind "n" "incrementvar cl_drawhud_force_radar -1 1 1" // 循环切换雷达强制显示状态。
bind "ralt" "toggle cl_teamid_overhead_mode 1 3" // 切换队友头顶标识模式。
bind "m" "mute" // 切换静音状态。
bind "r" "mirv_input camera;echo 已进入运镜模式，按Esc退出使路径生效" // 进入 HLAE 运镜模式。
bind "u" "demo_marktick" // 标记当前 Demo Tick。
bind "i" "demo_gotomark" // 跳转到已标记的 Demo Tick。
bind "," "demo_goto -5s relative" // Demo 快退 5 秒。
bind "." "demo_goto 5s relative" // Demo 快进 5 秒。
bind "[" "mirv_campath edit start delta+0.25" // 将镜头路径起始时间后移 0.25 秒。
bind "]" "mirv_campath edit start delta-0.25" // 将镜头路径起始时间前移 0.25 秒。
bind "f5" "mirv_cmd addTick rec" // 把当前 Tick 设为录制开始点。
bind "f6" "mirv_cmd addTick rec_end" // 把当前 Tick 设为录制结束点。
bind "f7" "mirv_cmd print" // 打印全部 mirv_cmd 指令。
bind "f8" "mirv_cmd clear;echo >>> Cleared!" // 清空全部 mirv_cmd 指令。
bind "capslock" "mirv_campath add;echo 已添加机位" // 添加当前镜头机位。
bind "ins" "mirv_campath print" // 打印全部镜头机位。
bind "del" "mirv_campath clear;echo 已清除所有机位" // 清空全部镜头机位。
bind "kp_1" "mirv_campath remove 1" // 删除编号 1 的镜头机位。
bind "kp_2" "mirv_campath remove 2" // 删除编号 2 的镜头机位。
bind "kp_3" "mirv_campath remove 3" // 删除编号 3 的镜头机位。
bind "kp_4" "mirv_campath remove 4" // 删除编号 4 的镜头机位。
bind "kp_5" "mirv_campath remove 5" // 删除编号 5 的镜头机位。
bind "kp_6" "mirv_campath remove 6" // 删除编号 6 的镜头机位。
bind "kp_7" "mirv_campath remove 7" // 删除编号 7 的镜头机位。
bind "kp_8" "mirv_campath remove 8" // 删除编号 8 的镜头机位。
bind "kp_9" "mirv_campath remove 9" // 删除编号 9 的镜头机位。
bind "kp_0" "mirv_campath remove 0" // 删除编号 0 的镜头机位。
