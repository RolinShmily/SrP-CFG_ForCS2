// Demo/HLAE physical workspace. binddefaults intentionally runs first.
binddefaults                              // 先恢复当前 CS2 版本自带的默认键位，避免模式残留冲突。
bind "uparrow" "srp_demo_record_start" // 开始 HLAE 录制并继续播放 Demo。
bind "downarrow" "srp_demo_record_end" // 结束 HLAE 录制并暂停 Demo。
bind "t" "srp_demo_campath" // 切换镜头路径启用状态。
bind "y" "srp_demo_campath_draw" // 切换镜头路径显示。
bind "j" "srp_demo_dmsg" // 切换当前观察玩家的击杀信息。
bind "\" "srp_demo_block" // 切换击杀信息显示。
bind "=" "srp_demo_widefov" // 切换广角 FOV。
bind "mouse5" "srp_demo_gear_up" // 提高 Demo 播放速度。
bind "mouse4" "srp_demo_gear_down" // 降低 Demo 播放速度。
bind "q" "srp_demo_ui" // 打开 Demo 控制面板。
bind "p" "srp_demo_togglepause" // 暂停或继续 Demo。
bind "mouse3" "srp_demo_togglepause" // 暂停或继续 Demo。
bind "h" "srp_demo_hud_deathnotices" // 切换精简 HUD。
bind "k" "srp_demo_voice" // 切换游戏与解说语音。
bind "'" "srp_demo_player_voice" // 切换 Demo 玩家语音。
bind "x" "srp_demo_xray" // 切换观察 X 光。
bind "v" "srp_demo_crosshair" // 切换准星显示。
bind "b" "srp_demo_hud_full" // 切换完整 HUD。
bind "n" "srp_demo_radar" // 循环切换雷达强制显示状态。
bind "ralt" "srp_demo_teamid" // 切换队友头顶标识模式。
bind "m" "srp_demo_mute" // 切换静音状态。
bind "r" "srp_demo_camera_mode" // 进入 HLAE 运镜模式。
bind "u" "srp_demo_marktick" // 标记当前 Demo Tick。
bind "i" "srp_demo_gotomark" // 跳转到已标记的 Demo Tick。
bind "," "srp_demo_seek_back" // Demo 快退 5 秒。
bind "." "srp_demo_seek_forward" // Demo 快进 5 秒。
bind "[" "srp_demo_campath_start_forward" // 将镜头路径起始时间后移 0.25 秒。
bind "]" "srp_demo_campath_start_back" // 将镜头路径起始时间前移 0.25 秒。
bind "f5" "srp_demo_tick_rec" // 把当前 Tick 设为录制开始点。
bind "f6" "srp_demo_tick_rec_end" // 把当前 Tick 设为录制结束点。
bind "f7" "srp_demo_cmd_print" // 打印全部 mirv_cmd 指令。
bind "f8" "srp_demo_cmd_clear" // 清空全部 mirv_cmd 指令。
bind "capslock" "srp_demo_campath_add" // 添加当前镜头机位。
bind "ins" "srp_demo_campath_print" // 打印全部镜头机位。
bind "del" "srp_demo_campath_clear" // 清空全部镜头机位。
bind "kp_1" "srp_demo_campath_remove_1" // 删除编号 1 的镜头机位。
bind "kp_2" "srp_demo_campath_remove_2" // 删除编号 2 的镜头机位。
bind "kp_3" "srp_demo_campath_remove_3" // 删除编号 3 的镜头机位。
bind "kp_4" "srp_demo_campath_remove_4" // 删除编号 4 的镜头机位。
bind "kp_5" "srp_demo_campath_remove_5" // 删除编号 5 的镜头机位。
bind "kp_6" "srp_demo_campath_remove_6" // 删除编号 6 的镜头机位。
bind "kp_7" "srp_demo_campath_remove_7" // 删除编号 7 的镜头机位。
bind "kp_8" "srp_demo_campath_remove_8" // 删除编号 8 的镜头机位。
bind "kp_9" "srp_demo_campath_remove_9" // 删除编号 9 的镜头机位。
bind "kp_0" "srp_demo_campath_remove_0" // 删除编号 0 的镜头机位。
