alias "f60" "mirv_input fov 60" // 注册 alias f60：执行 mirv_input fov 60。
alias "f55" "mirv_input fov 55" // 注册 alias f55：执行 mirv_input fov 55。
alias "f50" "mirv_input fov 50" // 注册 alias f50：执行 mirv_input fov 50。
alias "f45" "mirv_input fov 45" // 注册 alias f45：执行 mirv_input fov 45。
alias "f40" "mirv_input fov 40" // 注册 alias f40：执行 mirv_input fov 40。
alias "f35" "mirv_input fov 35" // 注册 alias f35：执行 mirv_input fov 35。
alias "f30" "mirv_input fov 30" // 注册 alias f30：执行 mirv_input fov 30。
alias "f25" "mirv_input fov 25" // 注册 alias f25：执行 mirv_input fov 25。
alias "f20" "mirv_input fov 20" // 注册 alias f20：执行 mirv_input fov 20。
alias "f15" "mirv_input fov 15" // 注册 alias f15：执行 mirv_input fov 15。
alias "f10" "mirv_input fov 10" // 注册 alias f10：执行 mirv_input fov 10。
alias "pos" "mirv_campath edit position current" // 注册 alias pos：执行 mirv_campath edit position current。
alias "time" "mirv_campath edit start" // 注册 alias time：执行 mirv_campath edit start。
alias "post" "toggle r_csgo_postprocess_enable;echo [切换后处理滤镜]" // 注册 alias post：依次执行 toggle、echo，并提示“[切换后处理滤镜]”。
alias "demonoshow" "cl_spec_show_bindings 0;echo 屏蔽观察提示小字!" // 注册 alias demonoshow：依次执行 cl_spec_show_bindings、echo，并提示“屏蔽观察提示小字”。
alias "demoshow" "cl_spec_show_bindings 1;echo 显示观察提示小字!" // 注册 alias demoshow：依次执行 cl_spec_show_bindings、echo，并提示“显示观察提示小字”。
alias "grenadeoff" "sv_grenade_trajectory_prac_pipreview false;echo 已关闭投掷物轨迹预测!" // 注册 alias grenadeoff：依次执行 sv_grenade_trajectory_prac_pipreview、echo，并提示“已关闭投掷物轨迹预测”。
alias "grenadeon" "sv_grenade_trajectory_prac_pipreview true;echo 已开启投掷物轨迹预测!" // 注册 alias grenadeon：依次执行 sv_grenade_trajectory_prac_pipreview、echo，并提示“已开启投掷物轨迹预测”。
alias "bluron" "mirv_streams record fps 600;mirv_streams record screen settings blur;echo 动态模糊开启!" // 注册 alias bluron：依次执行 mirv_streams、echo，并提示“动态模糊开启”。
alias "bluroff" "mirv_streams record fps 60;mirv_streams record screen settings mp4;echo 动态模糊关闭!" // 注册 alias bluroff：依次执行 mirv_streams、echo，并提示“动态模糊关闭”。


