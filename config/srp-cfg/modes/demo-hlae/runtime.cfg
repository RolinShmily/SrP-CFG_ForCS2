// Persistent Demo/HLAE command vocabulary. No HLAE state or physical key is changed here.
alias "rec" "demo_timescale 1;fps_max 0;echo >>> HLAE录制开始;mirv_streams record start" // 注册 alias rec：依次执行 demo_timescale、fps_max、echo、mirv_streams，并提示“>>> HLAE录制开始”。
alias "rec_end" "mirv_streams record end;echo >>> HLAE录制结束" // 注册 alias rec_end：依次执行 mirv_streams、echo，并提示“>>> HLAE录制结束”。
alias "checkSetting" "echo;echo [当前录制FPS];mirv_streams record fps;echo" // 注册 alias checkSetting：依次执行 echo、mirv_streams，并提示“[当前录制FPS]”。
alias "campath" "campath_on" // 将 alias campath 转发到 campath_on。
alias "campath_on" "mirv_campath enabled 1;alias campath campath_off;echo >>> 摄像机功能已开启√" // 注册 alias campath_on：依次执行 mirv_campath、alias、echo，并提示“>>> 摄像机功能已开启√”。
alias "campath_off" "mirv_campath enabled 0;alias campath campath_on;echo >>> 摄像机功能已关闭×" // 注册 alias campath_off：依次执行 mirv_campath、alias、echo，并提示“>>> 摄像机功能已关闭×”。
alias "campath_draw" "campath_draw_on" // 将 alias campath_draw 转发到 campath_draw_on。
alias "campath_draw_on" "mirv_campath draw enabled 1;alias campath_draw campath_draw_off;echo >>> 摄像机路径显示已开启√" // 注册 alias campath_draw_on：依次执行 mirv_campath、alias、echo，并提示“>>> 摄像机路径显示已开启√”。
alias "campath_draw_off" "mirv_campath draw enabled 0;alias campath_draw campath_draw_on;echo >>> 摄像机路径显示已关闭×" // 注册 alias campath_draw_off：依次执行 mirv_campath、alias、echo，并提示“>>> 摄像机路径显示已关闭×”。
alias "dmsg" "dmsg_on" // 将 alias dmsg 转发到 dmsg_on。
alias "dmsg_on" "alias dmsg dmsg_off;mirv_deathmsg filter add attackerMatch=!Trace block=1;mirv_deathmsg lifetime 90;echo >>> 独显击杀信息（当前观察玩家）已开启√" // 注册 alias dmsg_on：依次执行 alias、mirv_deathmsg、echo，并提示“>>> 独显击杀信息（当前观察玩家）已开启√”。
alias "dmsg_off" "alias dmsg dmsg_on;mirv_deathmsg filter clear;mirv_deathmsg lifetime default;mirv_deathmsg clear;echo >>> 独显击杀信息已关闭×" // 注册 alias dmsg_off：依次执行 alias、mirv_deathmsg、echo，并提示“>>> 独显击杀信息已关闭×”。
alias "block" "blockOn" // 将 alias block 转发到 blockOn。
alias "blockOn" "alias block blockOff;mirv_deathmsg lifetime 0;echo [屏蔽击杀信息]" // 注册 alias blockOn：依次执行 alias、mirv_deathmsg、echo，并提示“[屏蔽击杀信息]”。
alias "blockOff" "alias block blockOn;mirv_deathmsg lifetime default;echo [击杀信息已恢复默认时间]" // 注册 alias blockOff：依次执行 alias、mirv_deathmsg、echo，并提示“[击杀信息已恢复默认时间]”。
alias "widefov" "widefovOn" // 将 alias widefov 转发到 widefovOn。
alias "widefovOn" "alias widefov widefovOff;mirv_fov 105;echo [已开启广角fov]" // 注册 alias widefovOn：依次执行 alias、mirv_fov、echo，并提示“[已开启广角fov]”。
alias "widefovOff" "alias widefov widefovOn;mirv_fov default;echo [已还原默认fov]" // 注册 alias widefovOff：依次执行 alias、mirv_fov、echo，并提示“[已还原默认fov]”。
alias "gear_up" "gear4" // 将 alias gear_up 转发到 gear4。
alias "gear_down" "gear14" // 将 alias gear_down 转发到 gear14。
alias "gear110" "demo_timescale 0.1;alias gear_up gear15;alias gear_down gear110;echo [Demo播放速度];echo X0.1" // 注册 alias gear110：依次执行 demo_timescale、alias、echo，并提示“[Demo播放速度] / X0.1”。
alias "gear15" "demo_timescale 0.2;alias gear_up gear14;alias gear_down gear110;echo [Demo播放速度];echo X0.2" // 注册 alias gear15：依次执行 demo_timescale、alias、echo，并提示“[Demo播放速度] / X0.2”。
alias "gear14" "demo_timescale 0.25;alias gear_up gear1;alias gear_down gear15;echo [Demo播放速度];echo X0.25" // 注册 alias gear14：依次执行 demo_timescale、alias、echo，并提示“[Demo播放速度] / X0.25”。
alias "gear1" "demo_timescale 1;alias gear_up gear4;alias gear_down gear14;echo [Demo播放速度];echo X1" // 注册 alias gear1：依次执行 demo_timescale、alias、echo，并提示“[Demo播放速度] / X1”。
alias "gear4" "demo_timescale 4;alias gear_up gear8;alias gear_down gear1;echo [Demo播放速度];echo X4" // 注册 alias gear4：依次执行 demo_timescale、alias、echo，并提示“[Demo播放速度] / X4”。
alias "gear8" "demo_timescale 8;alias gear_up gear8;alias gear_down gear4;echo [Demo播放速度];echo X8" // 注册 alias gear8：依次执行 demo_timescale、alias、echo，并提示“[Demo播放速度] / X8”。
alias "gear16" "demo_timescale 16;alias gear_up gear16;alias gear_down gear8;echo [Demo播放速度];echo X16" // 注册 alias gear16：依次执行 demo_timescale、alias、echo，并提示“[Demo播放速度] / X16”。
alias "ass" "toggle mp_display_kill_assists;echo [切换助攻显示]" // 注册 alias ass：依次执行 toggle、echo，并提示“[切换助攻显示]”。
alias "mute" "snd_menumusic_volume 0;snd_roundstart_volume 0;snd_roundend_volume 0;snd_roundaction_volume 0;snd_mapobjective_volume 0;snd_tensecondwarning_volume 0;snd_deathcamera_volume 0;snd_mvp_volume 0;snd_mute_mvp_music_live_players 1;snd_mute_losefocus 0;echo [关闭各项声音]" // 注册 alias mute：依次执行 snd_menumusic_volume、snd_roundstart_volume、snd_roundend_volume、snd_roundaction_volume、snd_mapobjective_volume、snd_tensecondwarning_volume 等动作，并提示“[关闭各项声音]”。
alias "t" "unbind uparrow;unbind downarrow;unbind leftarrow;unbind rightarrow;unbind pgup;unbind pgdn;unbind -;unbind =;echo >>> 已解绑运镜冲突按键" // 注册 alias t：依次执行 unbind、echo，并提示“>>> 已解绑运镜冲突按键”。
