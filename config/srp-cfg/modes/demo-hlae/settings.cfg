// Demo/HLAE workspace settings. Requires launching CS2 through HLAE with FFmpeg configured.
clear // 清空控制台，便于查看 Demo/HLAE 输出。
sv_cheats 1                              // 允许电影制作与调试命令。
cl_show_observer_crosshair 0             // 隐藏被观察玩家的准星。
cl_clock_correction 0                    // 减少 Demo 播放时的时钟校正卡顿。
tv_listen_voice_indices -1               // 启用全部低位玩家语音索引。
tv_listen_voice_indices_h -1             // 启用全部高位玩家语音索引。
mirv_campath enabled 1                   // 启用 HLAE 镜头路径。
mirv_input fov 90                        // 设置 HLAE 摄像机初始 FOV。
mirv_reshade enabled 1                   // 启用 ReShade 集成。
mirv_streams record campath 1            // 录制视频流时同时记录镜头路径。
engine_no_focus_sleep 0                  // 游戏失去焦点时保持完整运行速度。
mirv_streams record screen enabled 1     // 启用屏幕录制流。
mirv_streams record startMovieWav 1      // 录制视频时同时输出 WAV 音频。
mirv_streams record fps 600              // 使用高采样帧率生成动态模糊。
mirv_streams settings add ffmpeg mp4 "-c:v libx264 -pix_fmt yuv420p -preset ultrafast -crf 9 {QUOTE}{AFX_STREAM_PATH}\video.mp4{QUOTE}" // 注册 H.264 MP4 的 FFmpeg 编码参数。
mirv_streams settings add sampler blur // 创建动态模糊采样器。
mirv_streams settings edit blur settings mp4 // 让动态模糊采样器使用 MP4 编码设置。
mirv_streams settings edit blur strength 1 // 设置动态模糊强度。
mirv_streams settings edit blur method rectangle // 设置动态模糊采样方法。
mirv_streams settings edit blur exposure 0.7 // 设置动态模糊曝光时间。
mirv_streams settings edit blur fps 60 // 设置动态模糊输出帧率。
mirv_streams record screen settings blur // 让屏幕录制使用动态模糊设置。
campath_on                                // 重置镜头路径开关状态。
campath_draw_on                           // 默认显示镜头路径。
r_show_build_info 0                       // 隐藏版本构建信息。
r_fullscreen_gamma 2.4                    // 设置录制画面亮度基线。
fog_override 1                            // 覆盖地图雾效以获得清晰画面。
hud_showtargetid 0                        // 隐藏准星目标 ID。
mp_display_kill_assists 0                 // 隐藏击杀信息中的助攻。
mirv_cvar_unhide_all                      // 解锁 HLAE 需要的隐藏 ConVar。
demo_pause                                // 进入模式时暂停 Demo。
cl_showpos 0                              // 隐藏速度与坐标信息。
cl_spec_show_bindings 0                   // 隐藏观察者按键提示。
cl_hud_telemetry_frametime_show 0         // 隐藏帧时间遥测。
cl_hud_telemetry_net_misdelivery_show 0   // 隐藏网络丢包遥测。
cl_hud_telemetry_ping_show 0              // 隐藏延迟遥测。
cl_grenadecrosshair_decoy 0               // 隐藏诱饵弹投掷准星。
cl_grenadecrosshair_explosive 0 // 控制高爆手雷投掷准星。
cl_grenadecrosshair_fire 0 // 控制燃烧弹投掷准星。
cl_grenadecrosshair_flash 0 // 控制闪光弹投掷准星。
cl_grenadecrosshair_smoke 0 // 控制烟雾弹投掷准星。
cl_teamcounter_playercount_instead_of_avatars 0 // 顶部队伍栏显示玩家头像。
sv_grenade_trajectory_prac_pipreview false      // 隐藏投掷物轨迹画中画。
cl_hud_color 0                            // 使用默认 HUD 颜色。
cl_radar_always_centered 1                // 让雷达以当前观察者为中心。
cl_radar_scale 0.45                       // 使用适合录制的雷达缩放。
cl_hud_radar_scale 1                      // 使用默认 HUD 雷达尺寸。
cl_radar_icon_scale_min 0.6               // 使用默认雷达图标尺寸。
cl_radar_rotate 1                         // 让雷达随观察方向旋转。
echo "[SrP-CFG] Demo/HLAE settings applied; use srp_demo_keys for the destructive keymap." // 在控制台输出应用完成提示。
