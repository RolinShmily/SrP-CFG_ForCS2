// Built-in Preset starting points. These aliases are safe to call from user/custom.cfg.
// Put exactly one near the top of custom.cfg, then write personal overrides below it.
alias "srp_apply_default" "exec srp-cfg/presets/default/apply.cfg"
alias "srp_apply_echo" "exec srp-cfg/presets/echo/apply.cfg"
alias "srp_apply_yszh" "exec srp-cfg/presets/yszh/apply.cfg"
alias "srp_apply_visionl" "exec srp-cfg/presets/visionl/apply.cfg"

// Valve baseline reset. The raw command intentionally does not re-run user custom.cfg.
alias "srp_reset_valve" "exec srp-cfg/presets/valve/apply.cfg"
alias "srp_reset_valve_user" "exec srp-cfg/presets/valve/apply.cfg;execifexists srp-cfg/user/custom.cfg"
alias "srp_reset_valve_settings" "exec srp-cfg/presets/valve/settings.cfg"
alias "srp_reset_valve_keys" "exec srp-cfg/presets/valve/keymap.cfg"

// Feature entry points: settings and physical keymaps are always separate.
alias "srp_crosshair_view" "exec srp-cfg/features/crosshair-view/settings.cfg"
alias "srp_crosshair_view_keys" "exec srp-cfg/features/crosshair-view/with-keymap.cfg"
alias "srp_autoview" "exec srp-cfg/features/autoview/settings.cfg"
alias "srp_autoview_keys" "exec srp-cfg/features/autoview/with-keymap.cfg"
alias "srp_zeus" "exec srp-cfg/features/zeus/settings.cfg"
alias "srp_zeus_keys" "exec srp-cfg/features/zeus/with-keymap.cfg"
alias "srp_knife" "exec srp-cfg/features/knife/settings.cfg"

// Session modes: plain command changes mode state; _keys also installs its workspace keymap.
alias "srp_practice" "exec srp-cfg/modes/practice/settings.cfg"
alias "srp_practice_keys" "exec srp-cfg/modes/practice/with-keymap.cfg"
alias "srp_preview" "exec srp-cfg/modes/preview/settings.cfg"
alias "srp_preview_keys" "exec srp-cfg/modes/preview/with-keymap.cfg"
alias "srp_demo" "exec srp-cfg/modes/demo-hlae/settings.cfg"
alias "srp_demo_keys" "exec srp-cfg/modes/demo-hlae/with-keymap.cfg"
alias "srp_guidemake" "exec srp-cfg/modes/guidemake/settings.cfg"
alias "srp_guidemake_keys" "exec srp-cfg/modes/guidemake/with-keymap.cfg"

// Help topics.
alias "srp_help" "exec srp-cfg/helps/index.cfg"
alias "srp_help_presets" "exec srp-cfg/helps/presets.cfg"
alias "srp_help_reset" "exec srp-cfg/presets/valve/help.cfg"
alias "srp_help_crosshair" "exec srp-cfg/features/crosshair-view/help.cfg"
alias "srp_help_autoview" "exec srp-cfg/features/autoview/help.cfg"
alias "srp_help_knife" "exec srp-cfg/features/knife/help.cfg"
alias "srp_help_zeus" "exec srp-cfg/features/zeus/help.cfg"
alias "srp_help_practice" "exec srp-cfg/modes/practice/help.cfg"
alias "srp_help_preview" "exec srp-cfg/modes/preview/help.cfg"
alias "srp_help_guidemake" "exec srp-cfg/modes/guidemake/help.cfg"
alias "srp_help_demo" "exec srp-cfg/modes/demo-hlae/help.cfg"

alias "srp_reload" "exec autoexec.cfg"
