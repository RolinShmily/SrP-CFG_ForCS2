// Built-in Preset starting points. These aliases are safe to call from user/custom.cfg.
// Put exactly one near the top of custom.cfg, then write personal overrides below it.
alias "srp_apply_default" "exec srp-cfg/presets/default/apply.cfg" // 注册入口 srp_apply_default：执行 srp-cfg/presets/default/apply.cfg。
alias "srp_apply_echo" "exec srp-cfg/presets/echo/apply.cfg" // 注册入口 srp_apply_echo：执行 srp-cfg/presets/echo/apply.cfg。
alias "srp_apply_yszh" "exec srp-cfg/presets/yszh/apply.cfg" // 注册入口 srp_apply_yszh：执行 srp-cfg/presets/yszh/apply.cfg。
alias "srp_apply_visionl" "exec srp-cfg/presets/visionl/apply.cfg" // 注册入口 srp_apply_visionl：执行 srp-cfg/presets/visionl/apply.cfg。

// Valve baseline reset. The raw command intentionally does not re-run user custom.cfg.
alias "srp_reset_valve" "exec srp-cfg/presets/valve/apply.cfg" // 注册入口 srp_reset_valve：执行 srp-cfg/presets/valve/apply.cfg。
alias "srp_reset_valve_user" "exec srp-cfg/presets/valve/apply.cfg;execifexists srp-cfg/user/custom.cfg" // 注册 alias srp_reset_valve_user：依次执行 exec、execifexists。
alias "srp_reset_valve_settings" "exec srp-cfg/presets/valve/settings.cfg" // 注册入口 srp_reset_valve_settings：执行 srp-cfg/presets/valve/settings.cfg。
alias "srp_reset_valve_keys" "exec srp-cfg/presets/valve/keymap.cfg" // 注册入口 srp_reset_valve_keys：执行 srp-cfg/presets/valve/keymap.cfg。

// Feature entry points: settings and physical keymaps are always separate.
alias "srp_crosshair_view" "exec srp-cfg/features/crosshair-view/settings.cfg" // 注册入口 srp_crosshair_view：执行 srp-cfg/features/crosshair-view/settings.cfg。
alias "srp_crosshair_view_keys" "exec srp-cfg/features/crosshair-view/with-keymap.cfg" // 注册入口 srp_crosshair_view_keys：执行 srp-cfg/features/crosshair-view/with-keymap.cfg。
alias "srp_autoview" "exec srp-cfg/features/autoview/settings.cfg" // 注册入口 srp_autoview：执行 srp-cfg/features/autoview/settings.cfg。
alias "srp_autoview_keys" "exec srp-cfg/features/autoview/with-keymap.cfg" // 注册入口 srp_autoview_keys：执行 srp-cfg/features/autoview/with-keymap.cfg。
alias "srp_zeus" "exec srp-cfg/features/zeus/settings.cfg" // 注册入口 srp_zeus：执行 srp-cfg/features/zeus/settings.cfg。
alias "srp_zeus_keys" "exec srp-cfg/features/zeus/with-keymap.cfg" // 注册入口 srp_zeus_keys：执行 srp-cfg/features/zeus/with-keymap.cfg。
alias "srp_knife" "exec srp-cfg/features/knife/settings.cfg" // 注册入口 srp_knife：执行 srp-cfg/features/knife/settings.cfg。
alias "srp_knife_keys" "exec srp-cfg/features/knife/with-keymap.cfg" // 注册入口 srp_knife：执行 srp-cfg/features/knife/with-keymap.cfg。

// Session modes: plain command changes mode state; _keys also installs its workspace keymap.
alias "srp_practice" "exec srp-cfg/modes/practice/settings.cfg" // 注册入口 srp_practice：执行 srp-cfg/modes/practice/settings.cfg。
alias "srp_practice_keys" "exec srp-cfg/modes/practice/with-keymap.cfg" // 注册入口 srp_practice_keys：执行 srp-cfg/modes/practice/with-keymap.cfg。
alias "srp_pwa_prac" "exec srp-cfg/modes/pwa-prac/settings.cfg" // 注册入口 srp_pwa_prac：执行 srp-cfg/modes/pwa-prac/settings.cfg。
alias "srp_pwa_prac_keys" "exec srp-cfg/modes/pwa-prac/with-keymap.cfg" // 注册入口 srp_pwa_prac_keys：执行 srp-cfg/modes/pwa-prac/with-keymap.cfg。
alias "srp_preview" "exec srp-cfg/modes/preview/settings.cfg" // 注册入口 srp_preview：执行 srp-cfg/modes/preview/settings.cfg。
alias "srp_preview_keys" "exec srp-cfg/modes/preview/with-keymap.cfg" // 注册入口 srp_preview_keys：执行 srp-cfg/modes/preview/with-keymap.cfg。
alias "srp_demo" "exec srp-cfg/modes/demo-hlae/settings.cfg" // 注册入口 srp_demo：执行 srp-cfg/modes/demo-hlae/settings.cfg。
alias "srp_demo_keys" "exec srp-cfg/modes/demo-hlae/with-keymap.cfg" // 注册入口 srp_demo_keys：执行 srp-cfg/modes/demo-hlae/with-keymap.cfg。
alias "srp_guidemake" "exec srp-cfg/modes/guidemake/settings.cfg" // 注册入口 srp_guidemake：执行 srp-cfg/modes/guidemake/settings.cfg。
alias "srp_guidemake_keys" "exec srp-cfg/modes/guidemake/with-keymap.cfg" // 注册入口 srp_guidemake_keys：执行 srp-cfg/modes/guidemake/with-keymap.cfg。

