// SrP-CFG reusable aliases.
// These definitions belong to Runtime so VCFG-synced bindings keep working on every machine.

alias "keyhud" "pvp-hud-off" // 将 alias keyhud 转发到 pvp-hud-off。
alias "pvp-hud-off" "cl_draw_only_deathnotices 1;cl_drawhud_force_radar 1;alias keyhud pvp-hud-on;echo 已切换为PVP HUD：仅显示死亡通知、准星与雷达！" // 注册 alias pvp-hud-off：依次执行 cl_draw_only_deathnotices、cl_drawhud_force_radar、alias、echo，并提示“已切换为PVP HUD：仅显示死亡通知、准星与雷达！”。
alias "pvp-hud-on" "cl_draw_only_deathnotices 0;cl_drawhud_force_radar 0;alias keyhud pvp-hud-off;echo 已切换为PVP HUD：全部显示！" // 注册 alias pvp-hud-on：依次执行 cl_draw_only_deathnotices、cl_drawhud_force_radar、alias、echo，并提示“已切换为PVP HUD：全部显示！”。

alias "teamcounter" "toggle cl_teamcounter_playercount_instead_of_avatars 0 1" // 切换记分板头像/数字显示
alias "teamid" "toggle cl_teamid_overhead_mode 1 3" // 注册 alias teamid：执行 toggle cl_teamid_overhead_mode 1 3。
alias "tick" "cl_ticktiming print summary;cl_ticktiming print detail;" // “显示服务器tick信息”。
