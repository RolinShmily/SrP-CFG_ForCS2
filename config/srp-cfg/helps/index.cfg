echo ═══════════════════════════ SrP-CFG v3 帮助 ═══════════════════════════
echo 启动顺序：autoexec.cfg → Runtime 注册 → user/custom.cfg 最终覆盖。
echo 用户只编辑：srp-cfg/user/custom.cfg；更新时不要直接改 runtime/features/modes/presets。
echo ── Preset 与恢复 ──
echo srp_help_presets  : 查看 Default / Echo / YSZH / VisionL 起点及覆盖规则。
echo srp_help_reset    : 查看 Valve 基线重置、仅设置重置与仅键位重置。
echo ── 常驻功能 ──
echo srp_help_crosshair : 准星与持枪视角预设、颜色和投掷物准星。
echo srp_help_autoview  : 武器槽位切换时自动应用 view_0 / view_1。
echo srp_help_knife     : subclass_create 刀具模型编号与使用条件。
echo srp_help_zeus      : Zeus 攻击后自动回切与键位接管范围。
echo ── 会话模式 ──
echo srp_help_practice  : 跑图设置、训练键位、出生点与实战切换。
echo srp_help_preview   : 饰品预览 HUD、景深、FOV 和恢复命令。
echo srp_help_guidemake : Annotation 地图指南创建、保存与提交。
echo srp_help_demo      : HLAE 录制、运镜、播放速度和破坏性键位。
echo ── 入口规则 ──
echo 普通 srp_* 入口只应用 settings；带 _keys 的入口还会执行 keymap 并覆盖物理按键。
echo srp_reload 重新执行完整启动链；最终结果取决于 user/custom.cfg 中的 Preset 与个人覆盖。
echo ═══════════════════════════════════════════════════════════════════════
