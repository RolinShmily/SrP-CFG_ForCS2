echo ═════════════════ 内置 Preset 起点 ════════════════
echo srp_apply_default : 应用作者推荐的完整 settings 与 keymap。
echo srp_apply_echo    : 应用 Echo 的完整个人设置与键位案例。
echo srp_apply_yszh    : 应用 YSZH 的完整个人设置与键位案例。
echo srp_apply_visionl : 应用 VisionL 的完整个人设置与键位案例。
echo ── 正确用法 ──
echo 1. 在 srp-cfg/user/custom.cfg 顶部只保留一个 srp_apply_* 起点。
echo 2. 把个人灵敏度、准星、声音、HUD、bind 与 alias 写在该命令下面。
echo 3. 后写的同名命令覆盖 Preset；保存后执行 srp_reload 重新应用。
echo ── 作用边界 ──
echo 每个 Preset 都会执行 settings.cfg 与 keymap.cfg，因此会覆盖相关偏好和物理键位。
echo Preset 命令不会再次执行 custom.cfg，可安全作为用户配置的第一层。
echo 如果不启用任何 srp_apply_*，普通游戏设置可继续由 CS2 VCFG 管理。
echo 需要回到可审计的 Valve 基线时输入 srp_help_reset。
echo ═════════════════════════════════════════════════
