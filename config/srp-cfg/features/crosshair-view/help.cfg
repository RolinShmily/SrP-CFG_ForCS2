echo ═══════════════ 准星与持枪视角帮助 ═══════════════
echo srp_crosshair_view      : 应用 c00 准星和 v00 视角，不修改任何物理键位。
echo srp_crosshair_view_keys : 先应用上述设置，再绑定 7/8、左方向键和下方向键。
echo ── 准星预设 ──
echo c00 ... c07 : 立即加载对应 library/NN.cfg，并更新 whoamic 与 keyc 循环入口。
echo keyc        : 按 c00→c07 顺序循环；Default Preset 默认把 7 绑定到 keyc。
echo whoamic     : 在控制台显示当前准星预设说明；自定义准星可改回提示 alias。
echo ── 持枪视角预设 ──
echo v00 ... v07 : 设置 viewmodel_fov、X/Y/Z 偏移和 presetpos，并更新 keyv。
echo keyv        : 按 v00→v07 顺序循环；Default Preset 默认把 8 绑定到 keyv。
echo whoamiv     : 在控制台显示当前持枪视角预设说明。
echo ── 颜色与投掷物准星 ──
echo red/orange/yellow/green/cyan/blue/purple/black/white/pink/brown/gray
echo switchthrow : 同时开关五类投掷物准星；keep 强制保留玩家自定义准星。
echo 键位影响：_keys 会覆盖 7、8、左方向键与下方向键；普通入口不改键位。
echo ═════════════════════════════════════════════════
