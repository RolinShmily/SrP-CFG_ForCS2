// SrP-CFG 准星预设 06；修改后可在控制台执行 c06 立即预览。
cl_crosshair_drawoutline "false" // 控制准星描边。
cl_crosshair_dynamic_maxdist_splitratio "0.300000" // 动态准星最大扩散分段比例。
cl_crosshair_dynamic_splitalpha_innermod "1.000000" // 动态准星内层透明度倍率。
cl_crosshair_dynamic_splitalpha_outermod "0.500000" // 动态准星外层透明度倍率。
cl_crosshair_dynamic_splitdist "7" // 动态准星内外层分离距离。
cl_crosshair_outlinethickness "1.000000" // 准星描边粗细。
cl_crosshair_recoil "false" // 控制准星是否跟随后坐力。
cl_crosshair_sniper_width "2" // 狙击镜中心线粗细。
cl_crosshair_t "false" // 控制是否使用 T 形准星。
cl_crosshairalpha "255" // 准星透明度。
cl_crosshaircolor "5" // 准星颜色模式；5 表示使用自定义 RGB。
cl_crosshaircolor_b "56" // 自定义准星蓝色通道。
cl_crosshaircolor_g "230" // 自定义准星绿色通道。
cl_crosshaircolor_r "206" // 自定义准星红色通道。
cl_crosshairdot "true" // 控制准星中心点。
cl_crosshairgap "-5.000000" // 准星中心间距。
cl_crosshairgap_useweaponvalue "false" // 控制间距是否随武器变化。
cl_crosshairsize "1.400000" // 准星线段长度。
cl_crosshairstyle "4" // 准星样式编号。
cl_crosshairthickness "0.400000" // 准星线段粗细。
cl_crosshairusealpha "true" // 启用自定义准星透明度。
