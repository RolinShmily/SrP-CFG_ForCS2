// SrP-CFG 准星预设 01；修改后可在控制台执行 c01 立即预览。
cl_crosshair_drawoutline "false" // 将准星描边设为false：关闭线条外缘描边。
cl_crosshair_dynamic_maxdist_splitratio "0.300000" // 将动态准星内外线段分配比例设为 0.300000（0–1）；值越大，外侧线段占比越高。
cl_crosshair_dynamic_splitalpha_innermod "1.000000" // 将动态准星分离后内侧线段透明度倍率设为 1.000000（0–1）。
cl_crosshair_dynamic_splitalpha_outermod "0.500000" // 将动态准星分离后外侧线段透明度倍率设为 0.500000（通常 0.3–1）。
cl_crosshair_dynamic_splitdist "7" // 将动态准星开始分离的距离阈值设为 7；仅动态样式使用。
cl_crosshair_outlinethickness "0.500000" // 将准星描边粗细设为 0.500000；仅在描边开启时可见。
cl_crosshair_recoil "false" // 将准星后坐力跟随设为false：关闭准星随枪械后坐力移动。
cl_crosshair_t "false" // 将 T 形准星设为false：保留上方线段。
cl_crosshairalpha "255" // 将准星 Alpha 设为 255（0=完全透明，255=完全不透明）；需启用自定义透明度。
cl_crosshaircolor "5" // 将准星颜色模式设为 5（自定义 RGB）。
cl_crosshaircolor_b "255" // 将自定义准星蓝色通道设为 255（0–255）；颜色模式 5 时生效。
cl_crosshaircolor_g "255" // 将自定义准星绿色通道设为 255（0–255）；颜色模式 5 时生效。
cl_crosshaircolor_r "0" // 将自定义准星红色通道设为 0（0–255）；颜色模式 5 时生效。
cl_crosshairdot "false" // 将准星中心点设为false：隐藏中心点。
cl_crosshairgap "-2.400000" // 将准星中心间距设为 -2.400000；值越小线段越靠近中心，负值会进一步收紧。
cl_crosshairgap_useweaponvalue "false" // 将武器间距修正设为false：禁用不同武器对准星间距的额外影响。
cl_crosshairsize "1.100000" // 将每条准星线段长度设为 1.100000；数值越大线段越长。
cl_crosshairstyle "4" // 将准星样式设为 4（经典静态）。
cl_crosshairthickness "0.100000" // 将准星线段粗细设为 0.100000；数值越大线条越粗。
cl_crosshairusealpha "true" // 将自定义透明度设为true：使用 cl_crosshairalpha。
