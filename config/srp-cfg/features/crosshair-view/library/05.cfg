// SrP-CFG 准星预设 05；修改后可在控制台执行 c05 立即预览。
cl_crosshair_drawoutline "0" // 控制准星描边。
cl_crosshair_dynamic_maxdist_splitratio "0.300000" // 动态准星最大扩散分段比例。
cl_crosshair_dynamic_splitalpha_innermod "1" // 动态准星内层透明度倍率。
cl_crosshair_dynamic_splitalpha_outermod "0.5" // 动态准星外层透明度倍率。
cl_crosshair_dynamic_splitdist "7" // 动态准星内外层分离距离。
cl_crosshair_friendly_warning "1" // 控制瞄准队友时的友军警告。
cl_crosshair_outlinethickness "0.5" // 准星描边粗细。
cl_crosshair_t "0" // 控制是否使用 T 形准星。
cl_crosshairalpha "255" // 准星透明度。
cl_crosshaircolor "1" // 准星颜色模式编号。
cl_crosshaircolor_b "50" // 自定义准星蓝色通道。
cl_crosshaircolor_g "250" // 自定义准星绿色通道。
cl_crosshaircolor_r "50" // 自定义准星红色通道。
cl_crosshairdot "0" // 控制准星中心点。
cl_crosshairgap "-0.500000" // 准星中心间距。
cl_crosshairgap_useweaponvalue "0" // 控制间距是否随武器变化。
cl_crosshairsize "3.500000" // 准星线段长度。
cl_crosshairstyle "4" // 准星样式编号。
cl_crosshairthickness "1.000000" // 准星线段粗细。
cl_crosshairusealpha "1" // 启用自定义准星透明度。
cl_fixedcrosshairgap "3" // 固定准星样式的中心间距。
cl_crosshair_recoil 0 // 控制准星是否跟随后坐力。
