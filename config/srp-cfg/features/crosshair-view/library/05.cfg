// SrP-CFG 准星预设 05；修改后可在控制台执行 c05 立即预览。
cl_crosshair_drawoutline "0" // 将准星描边设为0：关闭线条外缘描边。
cl_crosshair_dynamic_maxdist_splitratio "0.300000" // 将动态准星内外线段分配比例设为 0.300000（0–1）；值越大，外侧线段占比越高。
cl_crosshair_dynamic_splitalpha_innermod "1" // 将动态准星分离后内侧线段透明度倍率设为 1（0–1）。
cl_crosshair_dynamic_splitalpha_outermod "0.5" // 将动态准星分离后外侧线段透明度倍率设为 0.5（通常 0.3–1）。
cl_crosshair_dynamic_splitdist "7" // 将动态准星开始分离的距离阈值设为 7；仅动态样式使用。
cl_crosshair_friendly_warning "1" // 控制瞄准队友时的友军警告。
cl_crosshair_outlinethickness "0.5" // 将准星描边粗细设为 0.5；仅在描边开启时可见。
cl_crosshair_t "0" // 将 T 形准星设为0：保留上方线段。
cl_crosshairalpha "255" // 将准星 Alpha 设为 255（0=完全透明，255=完全不透明）；需启用自定义透明度。
cl_crosshaircolor "1" // 将准星颜色模式设为 1（绿色）。
cl_crosshaircolor_b "50" // 将自定义准星蓝色通道设为 50（0–255）；颜色模式 5 时生效。
cl_crosshaircolor_g "250" // 将自定义准星绿色通道设为 250（0–255）；颜色模式 5 时生效。
cl_crosshaircolor_r "50" // 将自定义准星红色通道设为 50（0–255）；颜色模式 5 时生效。
cl_crosshairdot "0" // 将准星中心点设为0：隐藏中心点。
cl_crosshairgap "-0.500000" // 将准星中心间距设为 -0.500000；值越小线段越靠近中心，负值会进一步收紧。
cl_crosshairgap_useweaponvalue "0" // 将武器间距修正设为0：禁用不同武器对准星间距的额外影响。
cl_crosshairsize "3.500000" // 将每条准星线段长度设为 3.500000；数值越大线段越长。
cl_crosshairstyle "4" // 将准星样式设为 4（经典静态）。
cl_crosshairthickness "1.000000" // 将准星线段粗细设为 1.000000；数值越大线条越粗。
cl_crosshairusealpha "1" // 将自定义透明度设为1：使用 cl_crosshairalpha。
cl_fixedcrosshairgap "3" // 固定准星样式的中心间距。
cl_crosshair_recoil 0 // 将准星后坐力跟随设为0：关闭准星随枪械后坐力移动。
