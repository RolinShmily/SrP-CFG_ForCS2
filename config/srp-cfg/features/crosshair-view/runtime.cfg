alias "c07" "exec srp-cfg/features/crosshair-view/library/07.cfg;srp_c07_info;alias whoamic srp_c07_info;alias keyc c00" // 应用准星预设 C07，更新当前说明，并将循环入口指向 C00。

alias "srp_v00_info" "echo 您当前使用的是 v00 默认视角预设!" // 注册 alias srp_v00_info：输出“您当前使用的是 v00 默认视角预设”。
