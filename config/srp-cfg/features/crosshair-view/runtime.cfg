// Persistent crosshair/viewmodel command vocabulary.
// Runtime loads this file every launch so VCFG-synced alias bindings remain valid.
alias "srp_crosshair_custom_info" "echo 您当前使用的是自定义准星!" // 注册 alias srp_crosshair_custom_info：输出“您当前使用的是自定义准星”。
alias "srp_viewmodel_custom_info" "echo 您当前使用的是自定义视角!" // 注册 alias srp_viewmodel_custom_info：输出“您当前使用的是自定义视角”。
alias "whoamic" "srp_crosshair_custom_info" // 将 alias whoamic 转发到 srp_crosshair_custom_info。
alias "whoamiv" "srp_viewmodel_custom_info" // 将 alias whoamiv 转发到 srp_viewmodel_custom_info。
alias "keyc" "c00" // 将 alias keyc 转发到 c00。
alias "keyv" "v00" // 将 alias keyv 转发到 v00。

alias "srp_c00_info" "echo 您当前使用的是 c00 默认准星预设!" // 注册 alias srp_c00_info：输出“您当前使用的是 c00 默认准星预设”。
alias "srp_c01_info" "echo 您当前使用的是 c01 准星预设! 准星代码: CSGO-H9mcs-8GDFZ-MfxkQ-2Kx7O-pTLoD" // 注册 alias srp_c01_info：输出“您当前使用的是 c01 准星预设! 准星代码: CSGO-H9mcs-8GDFZ-MfxkQ-2Kx7O-pTLoD”。
alias "srp_c02_info" "echo 您当前使用的是 c02 准星预设! 准星代码: CSGO-oK2db-LY2wT-seq73-YTnJB-3bOUD" // 注册 alias srp_c02_info：输出“您当前使用的是 c02 准星预设! 准星代码: CSGO-oK2db-LY2wT-seq73-YTnJB-3bOUD”。
