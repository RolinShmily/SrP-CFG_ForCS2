alias "c00" "exec srp-cfg/features/crosshair-view/library/00.cfg;srp_c00_info;alias whoamic srp_c00_info;alias keyc c01" // 应用准星预设 C00，更新当前说明，并将循环入口指向 C01。
alias "c01" "exec srp-cfg/features/crosshair-view/library/01.cfg;srp_c01_info;alias whoamic srp_c01_info;alias keyc c02" // 应用准星预设 C01，更新当前说明，并将循环入口指向 C02。
alias "c02" "exec srp-cfg/features/crosshair-view/library/02.cfg;srp_c02_info;alias whoamic srp_c02_info;alias keyc c03" // 应用准星预设 C02，更新当前说明，并将循环入口指向 C03。
alias "c03" "exec srp-cfg/features/crosshair-view/library/03.cfg;srp_c03_info;alias whoamic srp_c03_info;alias keyc c04" // 应用准星预设 C03，更新当前说明，并将循环入口指向 C04。
alias "c04" "exec srp-cfg/features/crosshair-view/library/04.cfg;srp_c04_info;alias whoamic srp_c04_info;alias keyc c05" // 应用准星预设 C04，更新当前说明，并将循环入口指向 C05。
