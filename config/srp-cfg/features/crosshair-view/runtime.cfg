alias "srp_c05_info" "echo 您当前使用的是 c05 准星预设! 准星代码: CSGO-Q4APO-buiyc-i9V7H-7sxJN-Zy8rN" // 注册 alias srp_c05_info：输出“您当前使用的是 c05 准星预设! 准星代码: CSGO-Q4APO-buiyc-i9V7H-7sxJN-Zy8rN”。
alias "srp_c06_info" "echo 您当前使用的是 c06 准星预设! 准星代码: CSGO-LpB26-mhWAt-srQVK-fEE34-BWxTC" // 注册 alias srp_c06_info：输出“您当前使用的是 c06 准星预设! 准星代码: CSGO-LpB26-mhWAt-srQVK-fEE34-BWxTC”。
