alias "v00" "viewmodel_fov 68;viewmodel_offset_x 2;viewmodel_offset_y 2;viewmodel_offset_z -1;viewmodel_presetpos 0;srp_v00_info;alias whoamiv srp_v00_info;alias keyv v01" // 应用持枪视角预设 V00，更新当前说明，并将循环入口指向 V01。
alias "v01" "viewmodel_fov 60;viewmodel_offset_x 0;viewmodel_offset_y 1;viewmodel_offset_z -2;viewmodel_presetpos 0;srp_v01_info;alias whoamiv srp_v01_info;alias keyv v02" // 应用持枪视角预设 V01，更新当前说明，并将循环入口指向 V02。
alias "v02" "viewmodel_fov 68;viewmodel_offset_x 2.5;viewmodel_offset_y -1;viewmodel_offset_z -2;viewmodel_presetpos 0;srp_v02_info;alias whoamiv srp_v02_info;alias keyv v03" // 应用持枪视角预设 V02，更新当前说明，并将循环入口指向 V03。
alias "v03" "viewmodel_fov 68;viewmodel_offset_x 1.5;viewmodel_offset_y -2;viewmodel_offset_z -2;viewmodel_presetpos 0;srp_v03_info;alias whoamiv srp_v03_info;alias keyv v04" // 应用持枪视角预设 V03，更新当前说明，并将循环入口指向 V04。
alias "v04" "viewmodel_fov 65;viewmodel_offset_x 2.5;viewmodel_offset_y -2;viewmodel_offset_z -2;viewmodel_presetpos 0;srp_v04_info;alias whoamiv srp_v04_info;alias keyv v05" // 应用持枪视角预设 V04，更新当前说明，并将循环入口指向 V05。
alias "v05" "viewmodel_fov 62;viewmodel_offset_x 2.5;viewmodel_offset_y 2;viewmodel_offset_z -2;viewmodel_presetpos 0;srp_v05_info;alias whoamiv srp_v05_info;alias keyv v06" // 应用持枪视角预设 V05，更新当前说明，并将循环入口指向 V06。
alias "v06" "viewmodel_fov 68;viewmodel_offset_x 2.5;viewmodel_offset_y 0;viewmodel_offset_z -1.5;viewmodel_presetpos 3;srp_v06_info;alias whoamiv srp_v06_info;alias keyv v07" // 应用持枪视角预设 V06，更新当前说明，并将循环入口指向 V07。
alias "v07" "viewmodel_fov 68;viewmodel_offset_x 2.5;viewmodel_offset_y 2;viewmodel_offset_z -2;viewmodel_presetpos 0;srp_v07_info;alias whoamiv srp_v07_info;alias keyv v00" // 应用持枪视角预设 V07，更新当前说明，并将循环入口指向 V00。

alias "switchthrow" "nothrow;alias switchthrow throw" // 注册 alias switchthrow：依次执行 nothrow、alias。
alias "nothrow" "cl_grenadecrosshair_decoy 0;cl_grenadecrosshair_explosive 0;cl_grenadecrosshair_fire 0;cl_grenadecrosshair_flash 0;cl_grenadecrosshair_smoke 0;alias switchthrow throw;echo 已关闭投掷物准星!" // 注册 alias nothrow：依次执行 cl_grenadecrosshair_decoy、cl_grenadecrosshair_explosive、cl_grenadecrosshair_fire、cl_grenadecrosshair_flash、cl_grenadecrosshair_smoke、alias 等动作，并提示“已关闭投掷物准星”。
alias "throw" "cl_grenadecrosshair_decoy 1;cl_grenadecrosshair_explosive 1;cl_grenadecrosshair_fire 1;cl_grenadecrosshair_flash 1;cl_grenadecrosshair_smoke 1;alias switchthrow nothrow;echo 已开启投掷物准星!" // 注册 alias throw：依次执行 cl_grenadecrosshair_decoy、cl_grenadecrosshair_explosive、cl_grenadecrosshair_fire、cl_grenadecrosshair_flash、cl_grenadecrosshair_smoke、alias 等动作，并提示“已开启投掷物准星”。
alias "keep" "cl_grenadecrosshair_keepusercrosshair 1;echo 在投掷时保持自定义准星!" // 注册 alias keep：依次执行 cl_grenadecrosshair_keepusercrosshair、echo，并提示“在投掷时保持自定义准星”。

alias "red" "cl_crosshaircolor 5;cl_crosshaircolor_r 255;cl_crosshaircolor_g 0;cl_crosshaircolor_b 0;echo 准星颜色已更改为红色!" // 注册 alias red：依次执行 cl_crosshaircolor、cl_crosshaircolor_r、cl_crosshaircolor_g、cl_crosshaircolor_b、echo，并提示“准星颜色已更改为红色”。
