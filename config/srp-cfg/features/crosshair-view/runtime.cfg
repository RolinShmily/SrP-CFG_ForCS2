// Persistent crosshair/viewmodel command vocabulary.
// Runtime loads this file every launch so VCFG-synced alias bindings remain valid.
alias "srp_crosshair_custom_info" "echo 您当前使用的是自定义准星!"
alias "srp_viewmodel_custom_info" "echo 您当前使用的是自定义视角!"
alias "whoamic" "srp_crosshair_custom_info"
alias "whoamiv" "srp_viewmodel_custom_info"
alias "keyc" "c00"
alias "keyv" "v00"

alias "srp_c00_info" "echo 您当前使用的是 c00 默认准星预设!"
alias "srp_c01_info" "echo 您当前使用的是 c01 准星预设! 准星代码: CSGO-H9mcs-8GDFZ-MfxkQ-2Kx7O-pTLoD"
alias "srp_c02_info" "echo 您当前使用的是 c02 准星预设! 准星代码: CSGO-oK2db-LY2wT-seq73-YTnJB-3bOUD"
alias "srp_c03_info" "echo 您当前使用的是 c03 准星预设! 准星代码: CSGO-9StUb-FrcBs-HhYjr-mzVip-YScNE"
alias "srp_c04_info" "echo 您当前使用的是 c04 准星预设! 准星代码: CSGO-pqEaF-5AKXB-DCdnh-vpxAJ-94GSQ"
alias "srp_c05_info" "echo 您当前使用的是 c05 准星预设! 准星代码: CSGO-Q4APO-buiyc-i9V7H-7sxJN-Zy8rN"
alias "srp_c06_info" "echo 您当前使用的是 c06 准星预设! 准星代码: CSGO-LpB26-mhWAt-srQVK-fEE34-BWxTC"
alias "srp_c07_info" "echo 您当前使用的是 c07 准星预设! 准星代码: CSGO-mFiak-CTXws-wdhEJ-i3CK3-y5LsE"

alias "c00" "exec srp-cfg/features/crosshair-view/library/00.cfg;srp_c00_info;alias whoamic srp_c00_info;alias keyc c01"
alias "c01" "exec srp-cfg/features/crosshair-view/library/01.cfg;srp_c01_info;alias whoamic srp_c01_info;alias keyc c02"
alias "c02" "exec srp-cfg/features/crosshair-view/library/02.cfg;srp_c02_info;alias whoamic srp_c02_info;alias keyc c03"
alias "c03" "exec srp-cfg/features/crosshair-view/library/03.cfg;srp_c03_info;alias whoamic srp_c03_info;alias keyc c04"
alias "c04" "exec srp-cfg/features/crosshair-view/library/04.cfg;srp_c04_info;alias whoamic srp_c04_info;alias keyc c05"
alias "c05" "exec srp-cfg/features/crosshair-view/library/05.cfg;srp_c05_info;alias whoamic srp_c05_info;alias keyc c06"
alias "c06" "exec srp-cfg/features/crosshair-view/library/06.cfg;srp_c06_info;alias whoamic srp_c06_info;alias keyc c07"
alias "c07" "exec srp-cfg/features/crosshair-view/library/07.cfg;srp_c07_info;alias whoamic srp_c07_info;alias keyc c00"

alias "srp_v00_info" "echo 您当前使用的是 v00 默认视角预设!"
alias "srp_v01_info" "echo 您当前使用的是 v01 视角预设!"
alias "srp_v02_info" "echo 您当前使用的是 v02 视角预设!"
alias "srp_v03_info" "echo 您当前使用的是 v03 视角预设!"
alias "srp_v04_info" "echo 您当前使用的是 v04 视角预设!"
alias "srp_v05_info" "echo 您当前使用的是 v05 视角预设!"
alias "srp_v06_info" "echo 您当前使用的是 v06 视角预设!"
alias "srp_v07_info" "echo 您当前使用的是 v07 视角预设!"

alias "v00" "viewmodel_fov 68;viewmodel_offset_x 2;viewmodel_offset_y 2;viewmodel_offset_z -1;viewmodel_presetpos 0;srp_v00_info;alias whoamiv srp_v00_info;alias keyv v01"
alias "v01" "viewmodel_fov 60;viewmodel_offset_x 0;viewmodel_offset_y 1;viewmodel_offset_z -2;viewmodel_presetpos 0;srp_v01_info;alias whoamiv srp_v01_info;alias keyv v02"
alias "v02" "viewmodel_fov 68;viewmodel_offset_x 2.5;viewmodel_offset_y -1;viewmodel_offset_z -2;viewmodel_presetpos 0;srp_v02_info;alias whoamiv srp_v02_info;alias keyv v03"
alias "v03" "viewmodel_fov 68;viewmodel_offset_x 1.5;viewmodel_offset_y -2;viewmodel_offset_z -2;viewmodel_presetpos 0;srp_v03_info;alias whoamiv srp_v03_info;alias keyv v04"
alias "v04" "viewmodel_fov 65;viewmodel_offset_x 2.5;viewmodel_offset_y -2;viewmodel_offset_z -2;viewmodel_presetpos 0;srp_v04_info;alias whoamiv srp_v04_info;alias keyv v05"
alias "v05" "viewmodel_fov 62;viewmodel_offset_x 2.5;viewmodel_offset_y 2;viewmodel_offset_z -2;viewmodel_presetpos 0;srp_v05_info;alias whoamiv srp_v05_info;alias keyv v06"
alias "v06" "viewmodel_fov 68;viewmodel_offset_x 2.5;viewmodel_offset_y 0;viewmodel_offset_z -1.5;viewmodel_presetpos 3;srp_v06_info;alias whoamiv srp_v06_info;alias keyv v07"
alias "v07" "viewmodel_fov 68;viewmodel_offset_x 2.5;viewmodel_offset_y 2;viewmodel_offset_z -2;viewmodel_presetpos 0;srp_v07_info;alias whoamiv srp_v07_info;alias keyv v00"

alias "switchthrow" "nothrow;alias switchthrow throw"
alias "nothrow" "cl_grenadecrosshair_decoy 0;cl_grenadecrosshair_explosive 0;cl_grenadecrosshair_fire 0;cl_grenadecrosshair_flash 0;cl_grenadecrosshair_smoke 0;alias switchthrow throw;echo 已关闭投掷物准星!"
alias "throw" "cl_grenadecrosshair_decoy 1;cl_grenadecrosshair_explosive 1;cl_grenadecrosshair_fire 1;cl_grenadecrosshair_flash 1;cl_grenadecrosshair_smoke 1;alias switchthrow nothrow;echo 已开启投掷物准星!"
alias "keep" "cl_grenadecrosshair_keepusercrosshair 1;echo 在投掷时保持自定义准星!"

alias "red" "cl_crosshaircolor 5;cl_crosshaircolor_r 255;cl_crosshaircolor_g 0;cl_crosshaircolor_b 0;echo 准星颜色已更改为红色!"
alias "orange" "cl_crosshaircolor 5;cl_crosshaircolor_r 255;cl_crosshaircolor_g 165;cl_crosshaircolor_b 0;echo 准星颜色已更改为橙色!"
alias "yellow" "cl_crosshaircolor 5;cl_crosshaircolor_r 255;cl_crosshaircolor_g 255;cl_crosshaircolor_b 0;echo 准星颜色已更改为黄色!"
alias "green" "cl_crosshaircolor 5;cl_crosshaircolor_r 0;cl_crosshaircolor_g 255;cl_crosshaircolor_b 0;echo 准星颜色已更改为绿色!"
alias "cyan" "cl_crosshaircolor 5;cl_crosshaircolor_r 0;cl_crosshaircolor_g 255;cl_crosshaircolor_b 255;echo 准星颜色已更改为青色!"
alias "blue" "cl_crosshaircolor 5;cl_crosshaircolor_r 0;cl_crosshaircolor_g 0;cl_crosshaircolor_b 255;echo 准星颜色已更改为蓝色!"
alias "purple" "cl_crosshaircolor 5;cl_crosshaircolor_r 128;cl_crosshaircolor_g 0;cl_crosshaircolor_b 128;echo 准星颜色已更改为紫色!"
alias "black" "cl_crosshaircolor 5;cl_crosshaircolor_r 0;cl_crosshaircolor_g 0;cl_crosshaircolor_b 0;echo 准星颜色已更改为黑色!"
alias "white" "cl_crosshaircolor 5;cl_crosshaircolor_r 255;cl_crosshaircolor_g 255;cl_crosshaircolor_b 255;echo 准星颜色已更改为白色!"
alias "pink" "cl_crosshaircolor 5;cl_crosshaircolor_r 255;cl_crosshaircolor_g 192;cl_crosshaircolor_b 203;echo 准星颜色已更改为粉色!"
alias "brown" "cl_crosshaircolor 5;cl_crosshaircolor_r 165;cl_crosshaircolor_g 42;cl_crosshaircolor_b 42;echo 准星颜色已更改为棕色!"
alias "gray" "cl_crosshaircolor 5;cl_crosshaircolor_r 128;cl_crosshaircolor_g 128;cl_crosshaircolor_b 128;echo 准星颜色已更改为灰色!"
