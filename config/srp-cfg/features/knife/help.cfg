echo ═══════════════════ 刀具模型帮助 ══════════════════
echo srp_knife : 重新载入刀具编号 alias，不修改物理键位，也不会自动生成刀具。
echo 使用条件：进入允许 subclass_create 的本地/调试环境后，在控制台输入三位编号。
echo Default Preset 把 J 绑定到 srp_knife；knife/keymap.cfg 本身故意不提供默认键位。
echo ── 编号 500–514 ──
echo 500 刺刀 | 503 海豹短刀 | 505 折叠刀 | 506 穿肠刀 | 507 爪子刀
echo 508 M9刺刀 | 509 猎杀者匕首 | 512 弯刀 | 514 鲍伊猎刀
echo ── 编号 515–526 ──
echo 515 蝴蝶刀 | 516 暗影双匕 | 517 系绳匕首 | 518 求生匕首
echo 519 熊刀 | 520 折刀 | 521 流浪者匕首 | 522 短剑 | 523 锯齿爪刀
echo 524 默认匕首 | 525 骷髅匕首 | 526 尼泊尔
echo 示例：输入 507 执行 subclass_create 507，并在准星位置生成爪子刀模型。
echo 如果数字 alias 有响应但没有生成模型，请检查当前服务器是否允许 subclass_create。
