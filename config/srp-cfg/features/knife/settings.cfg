// Knife has no physical keymap or persistent preference; this refreshes its command library.
sv_cheats 1 // 开启作弊模式
exec srp-cfg/features/knife/runtime.cfg // 加载匕首模型切换的 Runtime 命令。
+srp_knife_switch // 消除按键抖动
-srp_knife_switch // 消除按键抖动
echo "[SrP-CFG] Knife command library ready; use srp_help_knife for model IDs." // 在控制台输出应用完成提示。
