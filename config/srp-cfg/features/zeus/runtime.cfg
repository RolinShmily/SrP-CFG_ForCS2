// Persistent Zeus command vocabulary.
// Runtime loads this file every launch so +firr bindings never lose their implementation.
alias "att0" "bind mouse1 +firr1;bind mouse2 +firr2" // 注册 alias att0：依次执行 bind、bind。
alias "att1" "bind mouse1 +attack;bind mouse2 +attack2" // 注册 alias att1：依次执行 bind、bind。
alias "+firr1" "+attack" // 将 alias +firr1 转发到 +attack。
alias "-firr1" "-attack;slot2;slot1;att1" // 注册 alias -firr1：依次执行 -attack、slot2、slot1、att1。
alias "+firr2" "+attack2" // 将 alias +firr2 转发到 +attack2。
alias "-firr2" "-attack2;slot2;slot1;att1" // 注册 alias -firr2：依次执行 -attack2、slot2、slot1、att1。
