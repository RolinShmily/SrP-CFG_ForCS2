// Zeus physical keymap. Selecting slot 4 enables the automatic attack wrapper.
unbind "1" // 清除 1 的旧绑定，避免与当前键位方案冲突。
unbind "2" // 清除 2 的旧绑定，避免与当前键位方案冲突。
unbind "3" // 清除 3 的旧绑定，避免与当前键位方案冲突。
unbind "4" // 清除 4 的旧绑定，避免与当前键位方案冲突。
unbind "5" // 清除 5 的旧绑定，避免与当前键位方案冲突。
unbind "q" // 清除 q 的旧绑定，避免与当前键位方案冲突。
bind "1" "slot1;att1" // 切换主武器，并恢复普通武器状态。
bind "2" "slot2;att1" // 切换副武器，并恢复普通武器状态。
bind "3" "slot3;att1" // 切换匕首或电击枪，并恢复普通武器状态。
bind "4" "slot11;att0" // 切换电击枪，并启用电击枪攻击后回切。
bind "5" "slot5;att1" // 切换 C4，并恢复普通武器状态。
bind "q" "lastinv;att1" // 切换到上一个武器，并恢复普通武器状态。
