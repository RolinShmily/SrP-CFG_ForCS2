echo ═══════════════════ Zeus 自动回切帮助 ══════════════════
echo srp_zeus      : 重新注册 att0 / att1 与 +firr1/+firr2，不修改物理键位。
echo srp_zeus_keys : 同时接管 1、2、3、4、5 与 Q，并在切到 Zeus 时包装鼠标攻击。
echo att0          : 把 MOUSE1/MOUSE2 改绑到 +firr1/+firr2，攻击松开后切 2→1 并恢复普通攻击。
echo att1          : 把 MOUSE1/MOUSE2 恢复为标准 +attack/+attack2。
echo ── _keys 行为 ──
echo 1/2/3/5/Q：切槽后执行 att1，确保普通武器使用标准攻击。
echo 4：切到 slot11（Zeus）后执行 att0，启用攻击后回切逻辑。
echo 该方案会覆盖 1–5、Q、MOUSE1 和 MOUSE2；普通 srp_zeus 不会改这些键。
echo 恢复方式：输入 att1 恢复鼠标攻击，再应用自己的 Preset/键位并执行 srp_reload。
echo ═══════════════════════════════════════════════════════
