echo ═════════════════ 自动视角帮助 ═════════════════
echo srp_autoview      : 重新注册 view_0 / view_1 默认指向，不修改物理键位。
echo srp_autoview_keys : 同时接管武器与投掷物槽位键，使切槽时自动应用视角。
echo view_0            : 主武器视角入口，默认转发到 v06。
echo view_1            : 副武器、刀、Zeus、C4 与投掷物视角入口，默认转发到 v00。
echo ── _keys 覆盖范围 ──
echo 1→slot1+view_0；2/3/4/5/6/Z/X/C/V→对应槽位+view_1。
echo 该键位方案会先 unbind 上述按键，再写入新绑定；CS2 VCFG 可能持久化这些变更。
echo Q 的 lastinv 无法可靠判断切换后的武器类型，因此不会自动修正 view_0/view_1。
echo 恢复方式：执行自己的 Preset 起点或在 custom.cfg 中重新绑定相关按键，再运行 srp_reload。
echo ═══════════════════════════════════════════════
