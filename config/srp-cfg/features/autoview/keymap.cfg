// Autoview physical keymap. These bindings may be persisted by CS2 VCFG.
unbind "1" // 清除 1 的旧绑定，避免与当前键位方案冲突。
unbind "2" // 清除 2 的旧绑定，避免与当前键位方案冲突。
unbind "3" // 清除 3 的旧绑定，避免与当前键位方案冲突。
unbind "4" // 清除 4 的旧绑定，避免与当前键位方案冲突。
unbind "5" // 清除 5 的旧绑定，避免与当前键位方案冲突。
unbind "6" // 清除 6 的旧绑定，避免与当前键位方案冲突。
unbind "z" // 清除 z 的旧绑定，避免与当前键位方案冲突。
unbind "x" // 清除 x 的旧绑定，避免与当前键位方案冲突。
unbind "c" // 清除 c 的旧绑定，避免与当前键位方案冲突。
unbind "v" // 清除 v 的旧绑定，避免与当前键位方案冲突。
bind "1" "slot1;view_0" // 切换主武器，并应用主武器持枪视角。
bind "2" "slot2;view_1" // 切换副武器，并应用通用持枪视角。
bind "3" "slot3;view_1" // 切换匕首或电击枪，并应用通用持枪视角。
bind "4" "slot11;view_1" // 切换电击枪，并应用通用持枪视角。
bind "5" "slot5;view_1" // 切换 C4，并应用通用持枪视角。
bind "6" "slot9;view_1" // 切换诱饵弹，并应用通用持枪视角。
bind "z" "slot6;view_1" // 切换高爆手雷，并应用通用持枪视角。
bind "x" "slot7;view_1" // 切换闪光弹，并应用通用持枪视角。
bind "c" "slot8;view_1" // 切换烟雾弹，并应用通用持枪视角。
bind "v" "slot10;view_1" // 切换燃烧弹，并应用通用持枪视角。
