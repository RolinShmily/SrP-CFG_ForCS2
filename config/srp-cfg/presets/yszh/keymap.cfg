// YSZH example: complete personal keymap.

// Movement and combat
bind "w" "+forward" // 向前移动。
bind "s" "+back" // 向后移动。
bind "a" "+left" // 向左移动。
bind "d" "+right" // 向右移动。
bind "mouse1" "+attack" // 普通攻击。
bind "mouse2" "+attack2" // 特殊攻击或辅助开火。
bind "mouse_x" "yaw" // 鼠标水平移动控制视角。
bind "mouse_y" "pitch" // 鼠标垂直移动控制视角。
bind "e" "+use" // 使用或互动。
bind "r" "+reload" // 装填弹药。
bind "f" "+lookatweapon" // 检视武器。
bind "space" "+jump" // 跳跃。
bind "mouse4" "+duck" // 蹲下。
bind "tab" "+showscores" // 显示计分板。
bind "g" "drop" // 丢弃当前物品。
bind "m" "teammenu" // 打开队伍选择菜单。
bind "shift" "+sprint" // 静步移动。
bind "b" "buymenu" // 打开购买菜单。

// Weapon and grenade slots
bind "1" "slot1" // 切换主武器。
bind "2" "slot2" // 切换副武器。
bind "3" "slot3" // 切换匕首或电击枪。
bind "4" "slot4" // 切换投掷物选择槽。
bind "5" "slot5" // 切换 C4。
bind "6" "slot9" // 切换诱饵弹。
bind "z" "slot6" // 切换高爆手雷。
bind "q" "slot7" // 切换闪光弹。
bind "c" "slot8" // 切换烟雾弹。
bind "x" "slot10" // 切换燃烧弹。
bind "'" "radio2;slot12" // 打开无线电菜单并切换 X 光/医疗针槽。

// Communication and common actions
bind "y" "+spray_menu" // 打开喷漆菜单。
bind "u" "messagemode" // 打开全局聊天。
bind "i" "messagemode2" // 打开团队聊天。
bind "mwheeldown" "invnext" // 选择下一个物品。
bind "mwheelup" "invprev" // 选择上一个物品。
bind "v" "+voicerecord" // 按住进行语音通信。
bind "mouse3" "player_ping" // 放置玩家标记。
bind "alt" "+radialradio" // 打开快捷聊天轮盘。
bind "ralt" "noclip" // 切换飞行模式。
bind "`" "toggleconsole" // 打开或关闭开发者控制台。
bind "h" "switchhands" // 切换左右手持枪。
bind "t" "toggleradarscale" // 切换雷达缩放比例。

// Buy shortcuts; F1/F2 remain intentionally unbound.
unbind "f1" // 清除 f1 的旧绑定，避免与当前键位方案冲突。
unbind "f2" // 清除 f2 的旧绑定，避免与当前键位方案冲突。
bind "del" "toggle volume 0.10 1.00" // 在低音量与正常音量之间切换。
bind "k" "say_team !drop" // 向平台队友发送发刀指令。
bind "\" "say_team .hp" // 向 5E 团队聊天发送伤害统计指令。
bind "n" "toggle cl_teamid_overhead_mode 1 3" // 切换队友头顶标识模式。

// SrP feature and mode entry keys
bind "7" "keyc" // 循环切换准星预设。
bind "8" "keyv" // 循环切换持枪视角预设。
bind "o" "srp_reload" // 重新载入 Runtime 与用户配置。
bind "j" "srp_knife_keys" // 切换匕首模型。
bind "p" "srp_practice_keys" // 进入跑图模式并应用键位。
bind "home" "srp_pwa_prac_keys" // 进入完美跑图模式并应用键位。
