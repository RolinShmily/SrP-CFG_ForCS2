// VisionL example: complete personal preference set.

// Mouse
sensitivity 1.2 // 鼠标基础灵敏度。
zoom_sensitivity_ratio 1 // 开镜灵敏度倍率。
m_yaw 0.022 // 鼠标水平转向系数。

// Crosshair and grenade crosshair
crosshair true // 启用游戏准星。
cl_crosshair_sniper_width 1 // 狙击镜中心线粗细。
cl_sniper_show_inaccuracy 0 // 控制狙击镜扩散提示。
cl_grenadecrosshair_decoy 1 // 控制诱饵弹投掷准星。
cl_grenadecrosshair_explosive 1 // 控制高爆手雷投掷准星。
cl_grenadecrosshair_fire 1 // 控制燃烧弹投掷准星。
cl_grenadecrosshair_flash 1 // 控制闪光弹投掷准星。
cl_grenadecrosshair_keepusercrosshair 1 // 投掷物准星出现时保留用户准星。
cl_grenadecrosshair_smoke 1 // 控制烟雾弹投掷准星。
cl_grenadecrosshairdelay_decoy 0.50 // 诱饵弹投掷准星出现延迟。
cl_grenadecrosshairdelay_explosive 0.50 // 高爆手雷投掷准星出现延迟。
cl_grenadecrosshairdelay_fire 0.50 // 燃烧弹投掷准星出现延迟。
cl_grenadecrosshairdelay_flash 0.50 // 闪光弹投掷准星出现延迟。
cl_grenadecrosshairdelay_smoke 0.50 // 烟雾弹投掷准星出现延迟。
cl_observed_bot_crosshair 2 // 观察机器人时的准星显示模式。
cl_show_observer_crosshair 2 // 观察其他玩家时的准星显示模式。
cl_teamid_overhead_fade_near_crosshair 0.5 // 队友标识靠近准星时的淡出距离。
c06 // 应用准星预设 06。
cyan // 把自定义准星颜色切换为青色。
v06 // 应用持枪视角预设 06。

// Radar
cl_radar_always_centered 0 // 控制雷达是否始终以玩家为中心。
cl_radar_scale 0.37 // 雷达地图缩放比例。
cl_hud_radar_scale 1 // HUD 中雷达组件的整体尺寸。
cl_teammate_colors_show 2 // 雷达与队友标识的颜色显示模式。
cl_radar_icon_scale_min 0.6 // 雷达人物图标的最小尺寸。
cl_radar_rotate 1 // 控制雷达是否跟随玩家朝向旋转。
cl_radar_square_always 0 // 控制雷达是否始终保持方形。
cl_radar_square_with_scoreboard 1 // 控制计分板打开时是否使用方形雷达。
cl_hud_radar_blur_background 1 // 控制雷达背景模糊。
cl_hud_radar_background_alpha 0.63 // 雷达背景透明度。
cl_hud_radar_map_additive 1 // 控制雷达地图的叠加混合效果。

// HUD
hud_showtargetid 0 // 控制准星目标 ID 显示。
hud_scaling 0.85 // HUD 整体缩放比例。
safezonex 0.88 // HUD 水平安全区比例。
safezoney 0.905 // HUD 垂直安全区比例。
cl_color 3 // 玩家在队伍中的标识颜色。
cl_showloadout 0 // 控制装备栏是否常驻显示。
cl_hud_color 5 // HUD 主题颜色编号。

// Audio
volume 1 // 游戏主音量。
snd_headphone_eq 0 // 耳机均衡器模式。
snd_menumusic_volume 0 // 主菜单音乐音量。
snd_roundstart_volume 0 // 回合开始音乐音量。
snd_roundend_volume 0 // 回合结束音乐音量。
snd_roundaction_volume 0 // 回合行动音乐音量。
snd_mvp_volume 0.12 // MVP 音乐音量。
snd_mapobjective_volume 0 // 炸弹或人质目标音乐音量。
snd_tensecondwarning_volume 0 // 十秒警告音乐音量。
snd_deathcamera_volume 0 // 死亡视角音乐音量。
snd_mute_mvp_music_live_players 1 // 双方仍有玩家存活时静音 MVP 音乐。
snd_mute_losefocus 0 // 游戏失去焦点时是否静音。
voice_modenable 1 // 启用玩家语音通信。

// General preferences
cl_hud_telemetry_frametime_show 2 // 帧时间与 FPS 遥测显示模式。
cl_hud_telemetry_ping_show 2 // 延迟遥测显示模式。
mm_dedicated_search_maxping 70 // 匹配服务器允许的最大延迟。
cl_prefer_lefthanded 0 // 默认持枪手设置。
cl_debounce_zoom 0 // 控制按住开镜键时是否防止连续切镜。
cl_silencer_mode 1 // 控制是否允许拆装消音器。
cl_use_opens_buy_menu 0 // 控制使用键是否打开购买菜单。
cl_dm_buyrandomweapons 0 // 控制死斗模式是否随机购买武器。
cl_teamcounter_playercount_instead_of_avatars 0 // 顶部队伍栏显示人数或头像。
r_drawtracers_firstperson 1 // 控制第一人称曳光弹。
r_fullscreen_gamma 2.6 // 全屏亮度 Gamma 值。
cl_teamid_overhead_mode 3 // 队友头顶标识显示模式。
cl_teamid_overhead_colors_show 1 // 队友头顶标识是否使用玩家颜色。
con_enable 1 // 启用开发者控制台。
fps_max 0 // 前台最大帧率；0 表示不限制。
gameinstructor_enable 0 // 控制游戏教学提示。
cl_autohelp false // 控制自动帮助提示。
func_break_max_pieces 0 // 可破坏物体产生的最大碎片数。
r_show_build_info 0 // 控制版本构建信息显示。
spec_replay_autostart 0 // 控制死亡回放自动播放。
cl_predict_body_shot_fx 0 // 控制身体命中特效预测。
cl_predict_head_shot_fx 0 // 控制头部命中特效预测。
cl_predict_kill_ragdolls 0 // 控制击杀布娃娃效果预测。

// Chat wheel
cl_radial_radio_tap_to_ping false // 控制快捷轮盘轻点是否直接标记。
cl_radial_radio_tab 0 // 默认激活的快捷轮盘页。
