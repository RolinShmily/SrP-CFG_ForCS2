cl_radial_radio_tab_0_text_7 "#Chatwheel_aplan" // 设置快捷轮盘第 0 页第 7 项。
cl_radial_radio_tab_0_text_8 "#Chatwheel_requestspend" // 设置快捷轮盘第 0 页第 8 项。
cl_radial_radio_tab_1_text_1 "#Chatwheel_bombcarrierspotted" // 设置快捷轮盘第 1 页第 1 项。
cl_radial_radio_tab_1_text_2 "#Chatwheel_requestecoround" // 设置快捷轮盘第 1 页第 2 项。
cl_radial_radio_tab_1_text_3 "#Chatwheel_multipleenemieshere" // 设置快捷轮盘第 1 页第 3 项。
cl_radial_radio_tab_1_text_4 "#Chatwheel_requestweapon" // 设置快捷轮盘第 1 页第 4 项。
