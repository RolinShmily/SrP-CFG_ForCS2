cl_radial_radio_tab_1_text_6 "#Chatwheel_ihavethebomb" // 设置快捷轮盘第 1 页第 6 项。
cl_radial_radio_tab_1_text_7 "#Chatwheel_oneenemyhere" // 设置快捷轮盘第 1 页第 7 项。
cl_radial_radio_tab_1_text_8 "#Chatwheel_requestspend" // 设置快捷轮盘第 1 页第 8 项。
cl_radial_radio_tab_2_text_1 "#Chatwheel_bombcarrierspotted" // 设置快捷轮盘第 2 页第 1 项。
cl_radial_radio_tab_2_text_2 "#Chatwheel_requestecoround" // 设置快捷轮盘第 2 页第 2 项。
cl_radial_radio_tab_2_text_3 "#Chatwheel_multipleenemieshere" // 设置快捷轮盘第 2 页第 3 项。
cl_radial_radio_tab_2_text_4 "#Chatwheel_requestweapon" // 设置快捷轮盘第 2 页第 4 项。
cl_radial_radio_tab_2_text_5 "#Chatwheel_rotatetome" // 设置快捷轮盘第 2 页第 5 项。
