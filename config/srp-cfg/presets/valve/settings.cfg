cl_radial_radio_tab_2_text_8 "#Chatwheel_requestspend" // 设置快捷轮盘第 2 页第 8 项。

// Non-archived session state changed by SrP modes; these commands may require a local sv_cheats session.
cl_drawhud true // 控制完整 HUD 显示。
cl_draw_only_deathnotices false // 控制是否仅显示准星与击杀信息。
cl_drawhud_force_radar 0 // 强制雷达显示状态。
r_dof_override false // 控制景深覆盖。
r_dof_override_near_blurry -100 // 景深近景模糊距离。
fov_cs_debug 0 // 调试视野 FOV 偏移。
cl_lock_camera false // 控制观察摄像机锁定。
fog_override 0 // 控制地图雾效覆盖。
mp_display_kill_assists true // 控制击杀助攻显示。
cl_spec_show_bindings true // 观察模式下显示玩家按键。
cl_showpos 0 // 控制速度与坐标信息显示。
sv_grenade_trajectory_prac_pipreview false // 控制投掷物轨迹画中画预览。
host_timescale 1 // 游戏全局时间倍率。
demo_timescale 1 // Demo 播放速度倍率。
cl_clock_correction true // 控制客户端时钟校正。
tv_listen_voice_indices 0 // Demo 中允许播放的语音索引。
tv_listen_voice_indices_h 0 // Demo 语音索引的高位掩码。
