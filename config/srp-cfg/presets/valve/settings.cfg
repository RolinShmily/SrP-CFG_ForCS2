// Valve baseline for every archived ConVar currently touched by SrP-CFG.
// Defaults were verified against SteamDatabase/GameTracking-CS2 DumpSource2/convars.txt
// and the locally installed CS2 build on 2026-07-10.
// CS2 exposes no release-level command for resetting arbitrary client ConVars;
// reset_gameconvars is cheat-only, so this list stays explicit and auditable.
// This is intentionally explicit and auditable; unknown VCFG fields and cs2_video.txt are untouched.

// Mouse and viewmodel
sensitivity 1.25                         // Valve 默认鼠标灵敏度。
zoom_sensitivity_ratio 1                // 中性的开镜灵敏度倍率。
m_yaw 0.022                             // 标准鼠标水平转向系数。
viewmodel_fov 60                        // Valve 默认持枪视角 FOV。
viewmodel_offset_x 1                    // 默认持枪视角水平偏移。
viewmodel_offset_y 1                    // 默认持枪视角纵深偏移。
viewmodel_offset_z -1                   // 默认持枪视角垂直偏移。
viewmodel_presetpos 1                   // Valve 桌面端默认持枪视角预设。

// Crosshair
crosshair true // 启用游戏准星。
cl_crosshair_drawoutline true // 控制准星描边。
cl_crosshair_dynamic_maxdist_splitratio 1 // 动态准星最大扩散分段比例。
cl_crosshair_dynamic_splitalpha_innermod 0 // 动态准星内层透明度倍率。
cl_crosshair_dynamic_splitalpha_outermod 1 // 动态准星外层透明度倍率。
cl_crosshair_dynamic_splitdist 3 // 动态准星内外层分离距离。
cl_crosshair_friendly_warning 1 // 控制瞄准队友时的友军警告。
cl_crosshair_outlinethickness 1 // 准星描边粗细。
cl_crosshair_recoil true // 控制准星是否跟随后坐力。
cl_crosshair_sniper_width 1 // 狙击镜中心线粗细。
cl_crosshair_t false // 控制是否使用 T 形准星。
cl_crosshairalpha 200 // 准星透明度。
cl_crosshaircolor 5 // 准星颜色模式；5 表示使用自定义 RGB。
cl_crosshaircolor_r 0 // 自定义准星红色通道。
cl_crosshaircolor_g 255 // 自定义准星绿色通道。
cl_crosshaircolor_b 0 // 自定义准星蓝色通道。
cl_crosshairdot false // 控制准星中心点。
cl_crosshairgap -2.2 // 准星中心间距。
cl_crosshairgap_useweaponvalue true // 控制间距是否随武器变化。
cl_crosshairsize 3.9 // 准星线段长度。
cl_crosshairstyle 2 // 准星样式编号。
cl_crosshairthickness 0.6 // 准星线段粗细。
cl_crosshairusealpha true // 启用自定义准星透明度。
cl_fixedcrosshairgap 3 // 固定准星样式的中心间距。
cl_sniper_show_inaccuracy true // 控制狙击镜扩散提示。
cl_observed_bot_crosshair 2 // 观察机器人时的准星显示模式。
cl_show_observer_crosshair 2 // 观察其他玩家时的准星显示模式。

// Grenade crosshair
cl_grenadecrosshair_decoy true // 控制诱饵弹投掷准星。
cl_grenadecrosshair_explosive true // 控制高爆手雷投掷准星。
cl_grenadecrosshair_fire true // 控制燃烧弹投掷准星。
cl_grenadecrosshair_flash true // 控制闪光弹投掷准星。
cl_grenadecrosshair_keepusercrosshair true // 投掷物准星出现时保留用户准星。
cl_grenadecrosshair_smoke true // 控制烟雾弹投掷准星。
cl_grenadecrosshairdelay_decoy 2 // 诱饵弹投掷准星出现延迟。
cl_grenadecrosshairdelay_explosive 2 // 高爆手雷投掷准星出现延迟。
cl_grenadecrosshairdelay_fire 2 // 燃烧弹投掷准星出现延迟。
cl_grenadecrosshairdelay_flash 2 // 闪光弹投掷准星出现延迟。
cl_grenadecrosshairdelay_smoke 2 // 烟雾弹投掷准星出现延迟。

// Radar and HUD
cl_radar_always_centered true // 控制雷达是否始终以玩家为中心。
cl_radar_icon_scale_min 0.6 // 雷达人物图标的最小尺寸。
cl_radar_rotate true // 控制雷达是否跟随玩家朝向旋转。
cl_radar_scale 0.7 // 雷达地图缩放比例。
cl_radar_square_always false // 控制雷达是否始终保持方形。
cl_radar_square_with_scoreboard true // 控制计分板打开时是否使用方形雷达。
cl_hud_radar_background_alpha 0.627 // 雷达背景透明度。
cl_hud_radar_blur_background true // 控制雷达背景模糊。
cl_hud_radar_map_additive true // 控制雷达地图的叠加混合效果。
cl_hud_radar_scale 1 // HUD 中雷达组件的整体尺寸。
cl_hud_color 0 // HUD 主题颜色编号。
hud_scaling 1 // HUD 整体缩放比例。
hud_showtargetid true // 控制准星目标 ID 显示。
safezonex 1 // HUD 水平安全区比例。
safezoney 1 // HUD 垂直安全区比例。
cl_showloadout true // 控制装备栏是否常驻显示。
cl_teamcounter_playercount_instead_of_avatars false // 顶部队伍栏显示人数或头像。
cl_teamid_overhead_colors_show true // 队友头顶标识是否使用玩家颜色。
cl_teamid_overhead_fade_near_crosshair 0.5 // 队友标识靠近准星时的淡出距离。
cl_teamid_overhead_mode 3 // 队友头顶标识显示模式。
cl_teammate_colors_show 1 // 雷达与队友标识的颜色显示模式。
cl_color 0 // 玩家在队伍中的标识颜色。

// Telemetry and visual feedback
cl_hud_telemetry_frametime_show 1 // 帧时间与 FPS 遥测显示模式。
cl_hud_telemetry_net_misdelivery_show 1 // 网络丢包遥测显示模式。
cl_hud_telemetry_ping_show 1 // 延迟遥测显示模式。
cl_predict_body_shot_fx false // 控制身体命中特效预测。
cl_predict_head_shot_fx false // 控制头部命中特效预测。
cl_predict_kill_ragdolls true // 控制击杀布娃娃效果预测。
r_drawtracers_firstperson true // 控制第一人称曳光弹。
r_fullscreen_gamma 2.2 // 全屏亮度 Gamma 值。
r_show_build_info true // 控制版本构建信息显示。
func_break_max_pieces 15 // 可破坏物体产生的最大碎片数。
spec_replay_autostart true // 控制死亡回放自动播放。
spec_show_xray 1 // 观察模式 X 光显示状态。
cl_versus_intro true // 控制对局队伍介绍动画。

// Input and general behavior
cl_autohelp true // 控制自动帮助提示。
gameinstructor_enable false // 控制游戏教学提示。
cl_prefer_lefthanded false // 默认持枪手设置。
cl_debounce_zoom true // 控制按住开镜键时是否防止连续切镜。
cl_silencer_mode 0 // 控制是否允许拆装消音器。
cl_use_opens_buy_menu false // 控制使用键是否打开购买菜单。
cl_dm_buyrandomweapons true // 控制死斗模式是否随机购买武器。
con_enable true // 启用开发者控制台。
fps_max 120 // 前台最大帧率；0 表示不限制。
engine_no_focus_sleep 20 // 游戏失去焦点时每帧休眠毫秒数。
mm_dedicated_search_maxping 150 // 匹配服务器允许的最大延迟。

// Audio
volume 1 // 游戏主音量。
snd_headphone_eq 0 // 耳机均衡器模式。
snd_menumusic_volume 0.04 // 主菜单音乐音量。
snd_roundstart_volume 0 // 回合开始音乐音量。
snd_roundend_volume 0.16 // 回合结束音乐音量。
snd_roundaction_volume 0 // 回合行动音乐音量。
snd_mvp_volume 0.16 // MVP 音乐音量。
snd_mapobjective_volume 0.04 // 炸弹或人质目标音乐音量。
snd_tensecondwarning_volume 0.04 // 十秒警告音乐音量。
snd_deathcamera_volume 0.16 // 死亡视角音乐音量。
snd_mute_mvp_music_live_players false // 双方仍有玩家存活时静音 MVP 音乐。
snd_mute_losefocus true // 游戏失去焦点时是否静音。
voice_modenable true // 启用玩家语音通信。

