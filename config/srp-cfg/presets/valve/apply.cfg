// Raw Valve baseline reset. user/custom.cfg is intentionally not re-applied here.
exec srp-cfg/presets/valve/settings.cfg // 恢复 SrP 涉及字段的 Valve 测试基线。
exec srp-cfg/presets/valve/keymap.cfg   // 调用游戏自带 binddefaults 恢复键位。
echo [SrP-CFG] Valve baseline reset complete. Run srp_reload to return to the normal startup stack.
