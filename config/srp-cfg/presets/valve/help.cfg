echo ═════════════════ Valve 基线重置帮助 ════════════════
echo srp_reset_valve          : 执行 Valve settings 与 binddefaults；不会再次加载 user/custom.cfg。
echo srp_reset_valve_settings : 只恢复 SrP-CFG 管理的偏好、模块状态和会话画面字段。
echo srp_reset_valve_keys     : 只执行 binddefaults，恢复当前 CS2 版本自带键位。
echo srp_reset_valve_user     : 先应用 Valve 基线，再执行 user/custom.cfg 的 Preset 与个人覆盖。
echo srp_reload               : 重新执行 autoexec 启动链；Runtime 注册后，最后加载当前 user/custom.cfg。
echo ── 使用建议 ──
echo 排查异常时先用 srp_reset_valve 建立干净基线；确认正常后再用 srp_reload 恢复用户层。
echo 只想重置键位时使用 srp_reset_valve_keys，避免同时改变声音、HUD、准星等偏好。
echo ── 不处理的内容 ──
echo 不删除、不写入 VCFG、_lastclouded、remotecache.vdf 与 cs2_video.txt。
echo 未列入 Valve settings.cfg 的未知 ConVar 不会被声称为已经恢复。
echo ═══════════════════════════════════════════════════
