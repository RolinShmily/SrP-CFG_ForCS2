// ══════════════════════════════════════════════════════════════════
// SrP-CFG v3 bootstrap
//
// Runtime 永久注册功能与 alias；user/custom.cfg 选择 Preset 起点并保存个人差异。
// 用户文件由安装器在更新、恢复与卸载 Runtime 时保护。
// ══════════════════════════════════════════════════════════════════

exec srp-cfg/runtime/init.cfg              // 注册 Runtime、alias、Feature 与 Mode。
execifexists srp-cfg/user/custom.cfg       // 最后执行用户 Preset 起点与个人覆盖。
