name: Deploy Website

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - 'app/website/**'
      - 'app/shared/**'
      - '.github/workflows/deploy-website.yml'
  workflow_dispatch:
    # 支持在 GitHub Actions 页面上手动触发

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Configure git to use HTTPS
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Install dependencies
        run: pnpm install:web

      - name: Build website
        run: pnpm build:web

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        working-directory: app/website
        run: npx wrangler deploy

      - name: Set Turnstile secret (if configured)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TURNSTILE_SECRET_KEY: ${{ secrets.CLOUDFLARE_TURNSTILE_SECRET || secrets.TURNSTILE_SECRET_KEY || '' }}
        working-directory: app/website
        run: |
          if [ -n "$TURNSTILE_SECRET_KEY" ]; then
            echo "$TURNSTILE_SECRET_KEY" | npx wrangler secret put TURNSTILE_SECRET_KEY
          else
            echo "TURNSTILE_SECRET_KEY not set. Skipping."
          fi
