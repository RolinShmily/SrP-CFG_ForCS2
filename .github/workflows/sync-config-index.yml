name: Sync SrP-CFG Knowledge Index

on:
  push:
    branches:
      - main
    paths:
      - 'config/**'
      - 'app/website/src/data/config-knowledge/*.json'
      - '.github/scripts/sync_config_vectorize.mjs'
      - '.github/scripts/sync_config_vectorize.test.mjs'
      - '.github/workflows/sync-config-index.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-srp-config-index
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Auto-update local Config knowledge
        run: |
          node .github/scripts/sync_config_vectorize.mjs --update
          node --test .github/scripts/sync_config_vectorize.test.mjs
          node .github/scripts/sync_config_vectorize.mjs --build --output .artifacts/config-knowledge-v3.json

      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add app/website/src/data/config-knowledge/*.json
          if ! git diff --cached --quiet; then
            git commit -m "chore(auto): update curated Config knowledge from source changes"
            git push
          else
            echo "No Config knowledge changes detected."
          fi

      - name: Upload structured knowledge dataset
        uses: actions/upload-artifact@v4
        with:
          name: srp-config-knowledge-v3
          path: .artifacts/config-knowledge-v3.json
          if-no-files-found: error
          retention-days: 30

      - name: Validate Cloudflare credentials
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_AI_TOKEN: ${{ secrets.CLOUDFLARE_AI_TOKEN }}
        run: |
          : "${CLOUDFLARE_ACCOUNT_ID:?CLOUDFLARE_ACCOUNT_ID is required}"
          : "${CLOUDFLARE_AI_TOKEN:?CLOUDFLARE_AI_TOKEN is required}"

      - name: Sync validated Config knowledge v3 to Vectorize
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_AI_TOKEN: ${{ secrets.CLOUDFLARE_AI_TOKEN }}
          SRP_CONFIG_INDEX_NAME: srp-config-index
        run: node .github/scripts/sync_config_vectorize.mjs
